<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>트갤 OPTC 도구 모음</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a14 50%, #050508 100%);
            color: #eee;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 24px 16px 48px;
            line-height: 1.5;
        }

        .site-header {
            max-width: 1100px;
            margin: 0 auto 28px;
            text-align: center;
        }
        .site-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 8px;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00ffcc, #4dd0e1, #ffd54f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .site-subtitle {
            color: #888;
            font-size: 14px;
            margin: 0;
        }

        .toolbar {
            max-width: 1100px;
            margin: 0 auto 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.15s, background 0.15s;
        }
        .search-input:focus {
            outline: none;
            border-color: #00ffcc;
            background: rgba(0,255,204,0.06);
        }
        .search-input::placeholder { color: #666; }
        .result-count {
            color: #888;
            font-size: 12px;
            white-space: nowrap;
        }
        .result-count strong { color: #00ffcc; }

        .grid {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 12px;
            padding: 12px 16px;
            color: inherit;
            text-decoration: none;
            transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s, background 0.18s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(0,255,204,0.10), transparent 60%);
            opacity: 0;
            transition: opacity 0.18s;
            pointer-events: none;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #00ffcc;
            box-shadow: 0 10px 28px rgba(0,255,204,0.18);
            background: linear-gradient(160deg, rgba(0,255,204,0.06), rgba(255,255,255,0.02));
        }
        .card:hover::before { opacity: 1; }

        .card-icon {
            font-size: 26px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,255,204,0.10);
            border: 1px solid rgba(0,255,204,0.30);
            border-radius: 10px;
            flex-shrink: 0;
        }
        .card-title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            margin: 0;
            letter-spacing: 0.3px;
            flex: 0 1 auto;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-tags {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .card-creator {
            display: inline-block;
            font-size: 11px;
            color: #fde047;
            background: rgba(253,224,71,0.08);
            border: 1px solid rgba(253,224,71,0.35);
            padding: 2px 8px;
            border-radius: 999px;
            white-space: nowrap;
            flex-shrink: 0;
            font-style: italic;
            letter-spacing: 0.3px;
        }
        .card-status {
            display: inline-block;
            font-size: 11px;
            color: #ff5252;
            background: rgba(255,82,82,0.10);
            border: 1px solid rgba(255,82,82,0.5);
            padding: 2px 8px;
            border-radius: 999px;
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .tag {
            font-size: 11px;
            color: #80deea;
            background: rgba(0,255,204,0.08);
            border: 1px solid rgba(0,255,204,0.25);
            padding: 2px 8px;
            border-radius: 999px;
            letter-spacing: 0.3px;
        }
        .card-arrow {
            color: #555;
            font-size: 16px;
            transition: color 0.18s, transform 0.18s;
            flex-shrink: 0;
            margin-left: 4px;
        }
        .card:hover .card-arrow {
            color: #00ffcc;
            transform: translateX(3px);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 14px;
        }

        footer {
            max-width: 1100px;
            margin: 36px auto 0;
            text-align: center;
            color: #444;
            font-size: 11px;
        }

        .youtuber-fab {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: #1f2937;
            color: #ff5252;
            cursor: pointer;
            font-size: 14px;
            font-weight: 900;
            border-radius: 999px;
            border: 2px solid #ff5252;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
            letter-spacing: 0.5px;
            white-space: nowrap;
            font-family: inherit;
        }
        .youtuber-fab:hover {
            transform: translateY(-3px) scale(1.05);
            background: #ff5252;
            color: #1f2937;
            box-shadow: 0 10px 28px rgba(255,82,82,0.55);
        }
        .youtuber-fab .fab-icon { font-size: 16px; line-height: 1; }

        .yt-modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(3px);
            display: none;
            z-index: 10000;
            cursor: pointer;
        }
        .yt-modal-mask.active { display: block; }
        .yt-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 480px;
            max-height: 80vh;
            background: #14141e;
            border: 1px solid rgba(255,82,82,0.5);
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 24px rgba(255,82,82,0.25);
            display: none;
            flex-direction: column;
            z-index: 10001;
            overflow: hidden;
        }
        .yt-modal.active { display: flex; }
        .yt-modal-header {
            padding: 14px 18px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .yt-modal-title {
            font-size: 16px;
            font-weight: 900;
            color: #ff5252;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .yt-modal-close {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            transition: all 0.15s;
        }
        .yt-modal-close:hover { background: #333; color: #fff; border-color: #666; }
        .yt-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .yt-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: inherit;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
        }
        .yt-item:hover {
            background: rgba(255,82,82,0.10);
            border-color: rgba(255,82,82,0.5);
            transform: translateX(2px);
        }
        .yt-item-icon {
            font-size: 18px;
            width: 36px;
            height: 36px;
            background: rgba(255,82,82,0.12);
            border: 1px solid rgba(255,82,82,0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding-left: 3px;
            padding-bottom: 5px;
        }
        .yt-item-content { flex: 1; min-width: 0; }
        .yt-item-name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .yt-item-desc {
            font-size: 11px;
            color: #888;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .yt-item-arrow {
            color: #555;
            font-size: 13px;
            flex-shrink: 0;
        }
        .yt-item:hover .yt-item-arrow { color: #ff5252; }
        .yt-empty {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 13px;
        }

        .webstore-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: #1f2937;
            color: #fde047;
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
            border-radius: 999px;
            border: 2px solid #fde047;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
            letter-spacing: 0.5px;
            white-space: nowrap;
            animation: webstoreFabPulse 2.5s ease-in-out infinite;
        }
        .webstore-fab:hover {
            transform: translateY(-3px) scale(1.05);
            background: #fde047;
            color: #1f2937;
            box-shadow: 0 10px 28px rgba(253,224,71,0.55);
        }
        .webstore-fab .fab-icon { font-size: 18px; line-height: 1; }
        @keyframes webstoreFabPulse {
            0%, 100% { box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 0 0 rgba(253,224,71,0.55); }
            50%      { box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 0 10px rgba(253,224,71,0); }
        }

        @media (max-width: 600px) {
            body { padding: 16px 10px 28px; }
            .site-title { font-size: 22px; }
            .site-subtitle { font-size: 11px; }
            .grid { gap: 8px; }
            .card {
                padding: 10px 12px;
                gap: 10px;
                border-radius: 10px;
                flex-wrap: wrap;
                row-gap: 6px;
            }
            .card-icon {
                width: 34px;
                height: 34px;
                font-size: 18px;
                border-radius: 8px;
                order: 1;
            }
            .card-title {
                font-size: 14px;
                line-height: 1.3;
                flex: 1 1 auto;
                order: 2;
            }
            .card-arrow {
                font-size: 14px;
                order: 3;
            }
            .card-tags {
                order: 4;
                flex-basis: 100%;
                margin-left: 44px;
                gap: 4px;
                flex-wrap: wrap;
            }
            .card-creator,
            .card-status {
                order: 2;
                margin-left: auto;
                font-size: 10px;
                padding: 1px 6px;
            }
            .tag { font-size: 10px; padding: 1px 6px; }

            .webstore-fab {
                bottom: 14px;
                right: 14px;
                padding: 10px 14px;
                font-size: 12px;
                gap: 6px;
            }
            .webstore-fab .fab-icon { font-size: 15px; }
            .youtuber-fab {
                bottom: 14px;
                left: 14px;
                padding: 10px 14px;
                font-size: 12px;
                gap: 6px;
            }
            .youtuber-fab .fab-icon { font-size: 14px; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <h1 class="site-title">트갤 OPTC 도구 모음</h1>
        <p class="site-subtitle">덱 구성 · 캐릭터 정보 · 게임 가이드 한곳에서</p>
    </header>

    <div class="toolbar">
        <input type="text" class="search-input" id="search-input"
               placeholder="도구 검색 (이름, 설명, 태그)">
        <span class="result-count"><strong id="result-count">0</strong>개</span>
    </div>

    <div class="grid" id="tools-grid"></div>

    <footer>
        © OPTC 비공식 도구 모음 · GitHub Pages 호스팅
    </footer>

    <a href="https://ww.bandainamcoentwebstore.com/onepiece-tc-gl/ko"
       class="webstore-fab"
       target="_blank"
       rel="noopener noreferrer"
       title="공식 웹스토어로 이동">
        <span class="fab-icon">🛒</span>
        <span>웹스토어</span>
    </a>

    <button class="youtuber-fab" id="youtuber-fab" title="OPTC 유튜버 목록">
        <span class="fab-icon">▶</span>
        <span>유튜버</span>
    </button>

    <div class="yt-modal-mask" id="yt-modal-mask"></div>
    <div class="yt-modal" id="yt-modal" role="dialog" aria-labelledby="yt-modal-title">
        <div class="yt-modal-header">
            <h2 class="yt-modal-title" id="yt-modal-title">
                <span>▶</span> OPTC 유튜버 채널
            </h2>
            <button class="yt-modal-close" id="yt-modal-close" title="닫기">✕</button>
        </div>
        <div class="yt-modal-body" id="yt-modal-body"></div>
    </div>

    <script>
        const TOOLS = [
            {
                href: 'game/newbie-guide.html',
                icon: '📚',
                title: '뉴비 가이드',
                desc: '입문자를 위한 게임 기본 / 육성 / 추천 캐릭 안내.',
                tags: ['가이드', '입문', '신규유저']
            },
            {
                href: 'https://hayaden.github.io/optcDB_Ko/characters/#/search/',
                icon: '🗃️',
                title: '케릭터 DB',
                desc: '전체 캐릭터 스탯/능력/필살기 통합 데이터베이스 + 검색.',
                tags: ['DB', '캐릭정보', '검색'],
                creator: '하야덴'
            },
            {
                href: 'https://hayaden.github.io/optc-ships/',
                icon: '⛵',
                title: '선박 DB',
                desc: '선박별 효과 / 강화 / 추천 사용처 데이터베이스.',
                tags: ['DB', '선박', '배'],
                creator: '하야덴'
            },
            {
                href: 'game/autoBuilder.html',
                icon: '🚢',
                title: '자동 덱 구성',
                desc: '기믹 패턴과 특별효과 캐릭을 입력하면 자동으로 최적의 덱을 구성해줍니다.',
                tags: ['덱구성', '시뮬레이터', '이벤트'],
                status: '미완성'
            },
            {
                href: 'game/fest-raid.html',
                icon: '⚔️',
                title: '토벌 특별효과 케릭 목록',
                desc: '토벌 페스티벌 특수 능력 보유 캐릭터를 한눈에 확인.',
                tags: ['캐릭정보', '토벌']
            },
            {
                href: 'game/coop-captains.html',
                icon: '🤝',
                title: '공동전투 선장 효과',
                desc: '6개 역할군별 공투 선장 효과 / 필살기 / 액션을 레벨/속성별로 조회.',
                tags: ['공동전투', '선장효과', '가이드']
            },
            {
                href: 'game/charCnt.html',
                icon: '📋',
                title: '트갤 도감 체크기[수동]',
                desc: '보유 캐릭터를 수동 체크해 도감 진행도를 관리.',
                tags: ['도감', '체크리스트', '수동']
            },
            {
                href: 'game/sugo.html',
                icon: '🎰',
                title: '스고페스 기록실',
                desc: '스고페스 뽑기 결과/픽업 기록을 모아두는 공간.',
                tags: ['스고페스', '기록', '뽑기']
            },
            {
                href: 'game/gameList.html',
                icon: '🎮',
                title: '트갤 미니 게임',
                desc: '잠깐 쉬어가는 트갤표 미니 게임 모음.',
                tags: ['미니게임', '재미']
            }
        ];

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildCard(t) {
            const tags = (t.tags || []).map(tag =>
                `<span class="tag">${escapeHtml(tag)}</span>`
            ).join('');
            const isExternal = /^https?:\/\//i.test(t.href || '');
            const target = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
            const arrow = isExternal ? '↗' : '→';
            const creator = t.creator
                ? `<span class="card-creator">created by ${escapeHtml(t.creator)}</span>`
                : '';
            const status = t.status
                ? `<span class="card-status">${escapeHtml(t.status)}</span>`
                : '';
            return `
                <a class="card" href="${escapeHtml(t.href)}"${target}>
                    <div class="card-icon">${t.icon || '📄'}</div>
                    <h2 class="card-title">${escapeHtml(t.title)}</h2>
                    <div class="card-tags">${tags}</div>
                    ${status}
                    ${creator}
                    <span class="card-arrow">${arrow}</span>
                </a>
            `;
        }

        function render(filter) {
            const grid = document.getElementById('tools-grid');
            const q = (filter || '').trim().toLowerCase();
            const filtered = !q
                ? TOOLS
                : TOOLS.filter(t => {
                    const hay = [
                        t.title || '',
                        t.desc || '',
                        ...(t.tags || [])
                    ].join(' ').toLowerCase();
                    return hay.includes(q);
                });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state">검색 결과가 없습니다.</div>`;
            } else {
                grid.innerHTML = filtered.map(buildCard).join('');
            }
            document.getElementById('result-count').textContent = filtered.length;
        }

        const YOUTUBERS = [
            { name: 'Snowman', url: 'https://youtube.com/@snowman6891' },
            { name: 'Snafkin', url: 'https://youtube.com/@snafkin8238' },
            { name: 'Chau', url: 'https://youtube.com/@chauzuoptc' },
            { name: 'Toadskii', url: 'https://youtube.com/@toadskii' },
            { name: 'Stump.D', url: 'https://youtube.com/@stump.d' },
        ];

        function buildYoutuberItem(y) {
            return `
                <a class="yt-item" href="${escapeHtml(y.url)}" target="_blank" rel="noopener noreferrer">
                    <span class="yt-item-icon">${y.icon || '▶'}</span>
                    <div class="yt-item-content">
                        <p class="yt-item-name">${escapeHtml(y.name)}</p>
                        ${y.desc ? `<p class="yt-item-desc">${escapeHtml(y.desc)}</p>` : ''}
                    </div>
                    <span class="yt-item-arrow">↗</span>
                </a>
            `;
        }

        function renderYoutubers() {
            const body = document.getElementById('yt-modal-body');
            if (YOUTUBERS.length === 0) {
                body.innerHTML = `<div class="yt-empty">아직 등록된 유튜버가 없습니다.<br>곧 추가 예정입니다.</div>`;
            } else {
                body.innerHTML = YOUTUBERS.map(buildYoutuberItem).join('');
            }
        }

        function openYoutuberModal() {
            renderYoutubers();
            document.getElementById('yt-modal-mask').classList.add('active');
            document.getElementById('yt-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeYoutuberModal() {
            document.getElementById('yt-modal-mask').classList.remove('active');
            document.getElementById('yt-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            render('');
            document.getElementById('search-input').addEventListener('input', (e) => {
                render(e.target.value);
            });
            document.getElementById('youtuber-fab').addEventListener('click', openYoutuberModal);
            document.getElementById('yt-modal-close').addEventListener('click', closeYoutuberModal);
            document.getElementById('yt-modal-mask').addEventListener('click', closeYoutuberModal);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeYoutuberModal();
            });
        });
    </script>
</body>
</html>
