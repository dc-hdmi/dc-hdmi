<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OPTC Auto Deck Builder</title>
    <script src="details_kor.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Malgun Gothic', sans-serif; margin: 20px; }
        h2 { border-left: 5px solid #fff; padding-left: 15px; margin-bottom: 20px; font-size: 22px; }
        .container { border: 1px solid #fff; padding: 20px; margin-bottom: 30px; border-radius: 10px; }

        /* 기믹 섹션 */
        .round-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .round-box { border: 1px solid #444; padding: 15px; background: #111; }
        .gimmick-list { margin-top: 15px; display: flex; flex-direction: column; gap: 5px; min-height: 50px; }
        .gimmick-item { border-bottom: 1px dashed #444; padding: 4px 0; font-size: 14px; display: flex; justify-content: space-between; }
        .del-btn { color: #ff6b6b; cursor: pointer; font-weight: bold; }

        /* 특공 섹션 */
        #boost-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; min-height: 100px; border: 1px solid #333; padding: 10px; }
        .boost-card { border: 1px solid #fff; padding: 5px; text-align: center; width: 80px; position: relative; }
        .boost-card .rank-badge { position: absolute; top: 2px; left: 2px; background: gold; color: #000; font-weight: bold; padding: 0 4px; font-size: 10px; border-radius: 3px; }
        .boost-card.rank-B .rank-badge { background: silver; }
        .boost-card.rank-C .rank-badge { background: #cd7f32; }
        .boost-card .remove-x { position: absolute; top: 0; right: 2px; color: red; cursor: pointer; font-size: 12px; }

        /* 중앙 버튼 섹션 */
        .action-area { text-align: center; margin: 40px 0; }
        .build-btn { 
            background: #00ffcc; color: #000; border: none; padding: 15px 40px; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 50px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
        .build-btn:hover { background: #00cca3; transform: scale(1.05); }

        /* 덱 레이아웃 */
        .deck-layout { display: grid; grid-template-columns: auto auto; justify-content: center; gap: 20px; max-width: 900px; margin: 0 auto; }
        .unit-group { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 5px; }
        .slot { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .slot label { display: block; font-size: 10px; margin-bottom: 3px; color: #aaa; font-weight: bold; }
        .char-box { width: 80px; height: 80px; border: 1px solid #fff; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .support-box { width: 55px; height: 55px; border: 1px dashed #777; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .char-box img, .support-box img { width: 100%; height: 100%; object-fit: cover; }
        .empty-slot { width: 55px; }
        .empty-text { color: #333; font-size: 9px; }

        /* 해결 분석 섹션 */
        .solution-container { max-width: 900px; margin: 30px auto; padding: 20px; background: #0a0a0a; border-top: 2px solid #00ffcc; }
        .solution-round { margin-bottom: 15px; }
        .solution-round h3 { color: #00ffcc; font-size: 16px; margin-bottom: 8px; border-bottom: 1px solid #333; }
        .solution-line { font-size: 13px; margin: 4px 0; padding-left: 10px; border-left: 2px solid #444; }
        .sol-label { color: #ffcc00; font-weight: bold; }

        input, select { background: #000; color: #fff; border: 1px solid #fff; padding: 4px; }
        button { background: #fff; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚔️ Battle Gimmicks</h2>
        <div class="round-grid">
            <script>
                const patterns = ["선장효과 무효", "데미지 감소", "데미지 격감", "방어력 상승", "화상", "마비", "필살기 봉쇄", "봉쇄", "위압"];
                let turnOptions = `<option value="0">없음</option>`;
                for(let t=1; t<=20; t++) turnOptions += `<option value="${t}">${t}턴</option>`;

                [2, 3].forEach(i => {
                    document.write(`
                        <div class="round-box">
                            <strong>BATTLE ${i} 패턴</strong><br><br>
                            <select id="sel-${i}">${patterns.map(p => `<option value="${p}">${p}</option>`).join('')}</select>
                            <select id="turn-${i}">${turnOptions}</select>
                            <button onclick="addGimmick(${i})">기믹 추가</button>
                            <div id="list-${i}" class="gimmick-list"></div>
                        </div>
                    `);
                });
            </script>
        </div>
    </div>

    <div class="container">
        <h2>⭐ Special Boost Characters</h2>
        <div style="margin-bottom: 10px;">
            <select id="boost-rank-select">
                <option value="A">A 등급 (최고)</option>
                <option value="B">B 등급 (중간)</option>
                <option value="C">C 등급 (일반)</option>
            </select>
            <input type="number" id="boost-id-input" placeholder="캐릭터 ID 입력">
            <button onclick="addBoost()">특별효과 케릭터 목록</button>
        </div>
        <div id="boost-list"></div>
    </div>

    <div class="action-area">
        <button class="build-btn" onclick="autoBuildDeck()">최적의 덱 구성 찾기 🔍</button>
    </div>

    <div class="container" style="border:none;">
        <h2 style="border-left: 5px solid #fff;">🚢 Optimized Party Deck</h2>
        <div class="deck-layout" id="deck-display"></div>
        <div id="deck-analysis" class="solution-container" style="display:none;"></div>
    </div>

    <script>
        let activeGimmicks = { 2: [], 3: [] }; 
        let boostChars = []; 

        function addGimmick(round) {
            const name = document.getElementById(`sel-${round}`).value;
            const turn = parseInt(document.getElementById(`turn-${round}`).value);
            activeGimmicks[round].push({ name, turn });
            renderGimmicks(round);
        }

        function renderGimmicks(round) {
            const target = document.getElementById(`list-${round}`);
            target.innerHTML = activeGimmicks[round].map((g, idx) => `
                <div class="gimmick-item">
                    ${g.name}${g.turn > 0 ? ':' + g.turn : ''} 
                    <span class="del-btn" onclick="removeGimmick(${round}, ${idx})">X</span>
                </div>
            `).join('');
        }

        function removeGimmick(round, index) {
            activeGimmicks[round].splice(index, 1);
            renderGimmicks(round);
        }

        function addBoost() {
            const id = document.getElementById('boost-id-input').value;
            const rank = document.getElementById('boost-rank-select').value;
            if(!id || boostChars.some(c => c.id === id)) return;
            boostChars.push({ id, rank });
            renderBoostList();
            document.getElementById('boost-id-input').value = '';
        }

        function renderBoostList() {
            const list = document.getElementById('boost-list');
            list.innerHTML = boostChars.map(char => `
                <div class="boost-card rank-${char.rank}">
                    <span class="rank-badge">${char.rank}</span>
                    <span class="remove-x" onclick="removeBoost('${char.id}')">x</span>
                    <img src="${generateImgSrc(char.id)}" style="width:70px;">
                    <div style="font-size:10px;">${char.id}</div>
                </div>
            `).join('');
        }
        
        function removeBoost(id) {
            boostChars = boostChars.filter(c => c.id !== id);
            renderBoostList();
        }

        function getReductionTurns(rawText, gimmickName) {
            if (!rawText) return 0;
            let targetText = typeof rawText === 'object' ? JSON.stringify(rawText) : String(rawText);
            if (gimmickName === "방어력 상승" && targetText.includes("방어력을 0으로")) return 99;
            if (gimmickName === "봉쇄") targetText = targetText.replace(/필살기\s?봉쇄/g, "SPECIAL_SEAL_TEMP");
            if (!targetText.includes(gimmickName)) return 0;
            const regex = new RegExp(`${gimmickName}[^\\d]{0,20}(\\d+)`, 'g');
            let maxTurns = 0;
            let match;
            while ((match = regex.exec(targetText)) !== null) {
                const turnValue = parseInt(match[1]);
                if (turnValue > maxTurns) maxTurns = turnValue;
            }
            return maxTurns === 0 && targetText.includes(gimmickName) ? 1 : maxTurns;
        }

        function autoBuildDeck() {
            if (boostChars.length < 1) { alert("특공 캐릭터를 먼저 등록해주세요!"); return; }

            let deck = { f1: null, c1: null, m1: null, m2: null, m3: null, m4: null, s1: null, s2: null, s3: null, s4: null, s5: null };
            let usedIds = new Set();
            let usedNames = new Set();
            
            let remainingGimmicks = [];
            [2, 3].forEach(r => activeGimmicks[r].forEach(g => remainingGimmicks.push({ ...g, currentTurns: g.turn, solved: false, round: r })));

            const isDuplicate = (id) => {
                const name = window.details_kor[id]?.name;
                if (usedIds.has(id)) return true;
                if (name && name !== "" && usedNames.has(name)) return true;
                return false;
            };

            const fillSlot = (id, isCaptain) => {
                const data = window.details_kor[id];
                if (isCaptain) { deck.c1 = id; deck.f1 = id; }
                else {
                    const slot = ['m1', 'm2', 'm3', 'm4'].find(s => !deck[s]);
                    if (slot) deck[slot] = id;
                    else return false;
                }
                usedIds.add(id);
                if (data?.name) usedNames.add(data.name);

                // 실시간 기믹 차감 로직 (여러 캐릭 합산 대응)
                remainingGimmicks.forEach(rg => {
                    if (rg.solved) return;
                    let s = getReductionTurns(data?.special, rg.name);
                    let c = isCaptain ? getReductionTurns(data?.captain, rg.name) : 0;
                    let m = !isCaptain ? getReductionTurns(data?.crewman, rg.name) : 0;
                    let maxReduction = Math.max(s, c, m);
                    
                    rg.currentTurns -= maxReduction;
                    if (rg.currentTurns <= 0) rg.solved = true;
                });
                return true;
            };

            ['A', 'B', 'C'].forEach(rank => {
                let rankChars = boostChars.filter(c => c.rank === rank);
                rankChars.forEach(c => {
                    if (isDuplicate(c.id)) return;
                    const data = window.details_kor[c.id];
                    const canContribute = remainingGimmicks.some(rg => !rg.solved && (
                        getReductionTurns(data?.special, rg.name) > 0 || 
                        getReductionTurns(data?.captain, rg.name) > 0 || 
                        getReductionTurns(data?.crewman, rg.name) > 0
                    ));

                    if (canContribute) {
                        if (!deck.c1) fillSlot(c.id, true);
                        else fillSlot(c.id, false);
                    }
                });

                rankChars.forEach(c => {
                    if (isDuplicate(c.id)) return;
                    if (!deck.c1) fillSlot(c.id, true);
                    else fillSlot(c.id, false);
                });
            });

            // 서포트 로직
            const baseSlots = ['c1', 'm1', 'm2', 'm3', 'm4'];
            baseSlots.forEach((slotKey, idx) => {
                const baseId = deck[slotKey];
                if (!baseId) return;
                const baseData = window.details_kor[baseId];
                let bestS = null; let maxScore = -1;
                Object.keys(window.details_kor).forEach(sId => {
                    const sData = window.details_kor[sId];
                    if (!sData || !sData.support || isDuplicate(sId)) return;
                    const target = sData.support.target || "";
                    if (target.includes("전 캐릭터") || target.includes(baseData?.name) || (baseData?.type && target.includes(baseData.type))) {
                        let score = 0;
                        remainingGimmicks.forEach(rg => { 
                            let reduction = getReductionTurns(sData.support.effect, rg.name);
                            if (reduction > 0) score += reduction; 
                        });
                        if (score > maxScore) { maxScore = score; bestS = sId; }
                    }
                });
                if (bestS) { deck[`s${idx + 1}`] = bestS; usedIds.add(bestS); }
            });

            applyToDeck(deck);
            analyzeGimmickSolutions(deck);
        }

        function analyzeGimmickSolutions(deck) {
            const analysisArea = document.getElementById('deck-analysis');
            analysisArea.style.display = 'block';
            let html = '';
            const slotNames = { f1: 'Friend', c1: 'Captain', m1: 'Member 1', m2: 'Member 2', m3: 'Member 3', m4: 'Member 4', s1: 'Support 1', s2: 'Support 2', s3: 'Support 3', s4: 'Support 4', s5: 'Support 5' };
            
            [2, 3].forEach(round => {
                const roundGimmicks = activeGimmicks[round];
                if (!roundGimmicks || roundGimmicks.length === 0) return;
                html += `<div class="solution-round"><h3>BATTLE ${round} 해결 분석</h3>`;
                
                roundGimmicks.forEach(g => {
                    let solvers = [];
                    let totalReduced = 0;
                    
                    for (const [slot, id] of Object.entries(deck)) {
                        if (!id) continue;
                        const data = window.details_kor[id];
                        let turn = 0;
                        let type = "";

                        let s = getReductionTurns(data?.special, g.name);
                        let c = (slot === 'c1' || slot === 'f1') ? getReductionTurns(data?.captain, g.name) : 0;
                        let m = slot.startsWith('m') ? getReductionTurns(data?.crewman, g.name) : 0;
                        let sup = slot.startsWith('s') ? getReductionTurns(data?.support?.effect, g.name) : 0;

                        if (s > 0) { turn = s; type = "필살기"; }
                        else if (c > 0) { turn = c; type = "선장"; }
                        else if (m > 0) { turn = m; type = "선원"; }
                        else if (sup > 0) { turn = sup; type = "서포트"; }

                        if (turn > 0) {
                            solvers.push(`${slotNames[slot]}(${turn}턴)`);
                            totalReduced += turn;
                        }
                    }

                    const isSolved = totalReduced >= g.turn;
                    html += `<div class="solution-line">
                        <span class="sol-label">● ${g.name} ${g.turn}턴 :</span> 
                        ${solvers.length > 0 ? solvers.join(' + ') : '조합 불가'} 
                        <span style="color:${isSolved ? '#00ffcc' : '#ff6b6b'}; font-weight:bold; margin-left:10px;">
                            [${isSolved ? '해결 완료' : '부족: ' + (g.turn - totalReduced) + '턴'}]
                        </span>
                    </div>`;
                });
                html += `</div>`;
            });
            analysisArea.innerHTML = html;
        }

        function applyToDeck(deck) {
            ['f1', 'c1', 'm1', 'm2', 'm3', 'm4', 's1', 's2', 's3', 's4', 's5'].forEach(s => {
                const container = document.getElementById(`img-${s}`);
                const id = deck[s];
                container.innerHTML = id ? `<img src="${generateImgSrc(id)}" title="ID: ${id}">` : '<span class="empty-text">EMPTY</span>';
            });
        }

        function generateImgSrc(id) {
            const i = parseInt(id);
            return `https://hayaden.github.io/optcDB_Ko/api/images/thumbnail/glo/${Math.floor(i / 1000)}/${(Math.floor((i % 1000) / 100) * 100).toString().padStart(3, '0')}/${i.toString().padStart(4, '0')}.png`;
        }

        document.getElementById('deck-display').innerHTML = `
            <div class="unit-group"><div class="empty-slot"></div><div class="slot"><label>FRIEND</label><div id="img-f1" class="char-box"></div></div></div>
            <div class="unit-group"><div class="slot"><label>CAPTAIN</label><div id="img-c1" class="char-box"></div></div><div class="slot"><label>SUPPORT</label><div id="img-s1" class="support-box"></div></div></div>
            <div class="unit-group"><div class="slot"><label>SUPPORT</label><div id="img-s2" class="support-box"></div></div><div class="slot"><label>MEMBER 1</label><div id="img-m1" class="char-box"></div></div></div>
            <div class="unit-group"><div class="slot"><label>MEMBER 2</label><div id="img-m2" class="char-box"></div></div><div class="slot"><label>SUPPORT</label><div id="img-s3" class="support-box"></div></div></div>
            <div class="unit-group"><div class="slot"><label>SUPPORT</label><div id="img-s4" class="support-box"></div></div><div class="slot"><label>MEMBER 3</label><div id="img-m3" class="char-box"></div></div></div>
            <div class="unit-group"><div class="slot"><label>MEMBER 4</label><div id="img-m4" class="char-box"></div></div><div class="slot"><label>SUPPORT</label><div id="img-s5" class="support-box"></div></div></div>
        `;
    </script>
</body>
</html>
