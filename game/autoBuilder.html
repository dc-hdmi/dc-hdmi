                    if (otherDeckIds.has(String(altId))) continue;
                    const u = getUnitMeta(altId);
                    if (u?.name) {
                        let isShared = false;
                        for (const dn of otherDeckNames) {
                            if (_shareCharacter(u.name, dn)) { isShared = true; break; }
                        }
                        if (isShared) continue;
                    }
                    if (!isCompatBoth(altId)) continue;

                    const orig = deck[slot];
                    deck[slot] = altId;
                    _recomputeGimmickStates(deck, remainingGimmicks);
                    const newScore = scoreState();
                    if (isBetter(newScore, bestAltScore)) {
                        bestAltId = altId;
                        bestAltScore = newScore;
                    }
                    deck[slot] = orig;
                }
                _recomputeGimmickStates(deck, remainingGimmicks);

                if (bestAltId && isBetter(bestAltScore, currentScore)) {
                    const orig = deck[slot];
                    usedIds.delete(orig);
                    const origName = getUnitMeta(orig)?.name;
                    if (origName) usedNames.delete(origName);
                    deck[slot] = bestAltId;
                    usedIds.add(bestAltId);
                    const newName = getUnitMeta(bestAltId)?.name;
                    if (newName) usedNames.add(newName);
                    _recomputeGimmickStates(deck, remainingGimmicks);
                    improvedThisIter = true;
                }

                applyToDeck(deck);
                _highlightSlot(slot, false);

                setTimeout(processNextSlot, 80); // 80ms 딜레이로 시각화
            };

            processNextSlot();
        }

        // 동기 버전 (기존 호환용 — 사용 안 함)
        function _intensiveOptimize(deck, remainingGimmicks, captainReqs, friendReqs, usedIds, usedNames) {
            const memberSlots = ['m1','m2','m3','m4'];
            const MAX_ITER = 4;
            const protectedBoostIdSet = new Set(
                (boostChars || []).filter(b => b.rank === 'A' || b.rank === 'B').map(b => String(b.id))
            );
            const preferredIdSet = new Set((preferredChars || []).map(String));

            const isCompatBoth = (id) => {
                if (!isMemberCompatibleWithCaptain(id, captainReqs)) return false;
                if (friendReqs && !friendReqs.unrestricted) {
                    if (!isMemberCompatibleWithCaptain(id, friendReqs)) return false;
                }
                return true;
            };
            const scoreState = () => {
                const unsolved = remainingGimmicks.filter(rg => !rg.solved).length;
                const totalRed = remainingGimmicks.reduce((s, rg) =>
                    s + Math.max(0, rg.turn - Math.max(0, rg.currentTurns)), 0);
                return { unsolved, totalRed };
            };
            const isBetter = (a, b) => {
                if (a.unsolved < b.unsolved) return true;
                if (a.unsolved > b.unsolved) return false;
                return a.totalRed > b.totalRed;
            };

            // 후보 풀: 모든 기믹의 솔버 + 모든 boost (필러)
            //   ID 내림차순 정렬 (신규 캐릭부터 시도) — 일반적으로 신규일수록 강함
            const candidatePoolSet = new Set();
            for (const rg of remainingGimmicks) {
                const solverIds = _getGimmickSolvers(rg.name);
                for (const id of solverIds) candidatePoolSet.add(String(id));
            }
            for (const b of (boostChars || [])) candidatePoolSet.add(String(b.id));
            const candidatePool = [...candidatePoolSet].sort((a, b) => (parseInt(b) || 0) - (parseInt(a) || 0));

            for (let iter = 0; iter < MAX_ITER; iter++) {
                let improved = false;
                for (const slot of memberSlots) {
                    const currentId = deck[slot];
                    if (!currentId) continue;
                    if (preferredIdSet.has(String(currentId))) continue;
                    if (protectedBoostIdSet.has(String(currentId))) continue;

                    const currentScore = scoreState();
                    let bestAltId = null;
                    let bestAltScore = currentScore;

                    const otherDeckIds = new Set(Object.values(deck).map(String).filter(Boolean));
                    otherDeckIds.delete(String(currentId));
                    const otherDeckNames = new Set();
                    for (const did of otherDeckIds) {
                        const u = getUnitMeta(did);
                        if (u?.name) otherDeckNames.add(u.name);
                    }

                    for (const altId of candidatePool) {
                        if (String(altId) === String(currentId)) continue;
                        if (otherDeckIds.has(String(altId))) continue;
                        const u = getUnitMeta(altId);
                        if (u?.name) {
                            let isShared = false;
                            for (const dn of otherDeckNames) {
                                if (_shareCharacter(u.name, dn)) { isShared = true; break; }
                            }
                            if (isShared) continue;
                        }
                        if (!isCompatBoth(altId)) continue;

                        const orig = deck[slot];
                        deck[slot] = altId;
                        _recomputeGimmickStates(deck, remainingGimmicks);
                        const newScore = scoreState();
                        if (isBetter(newScore, bestAltScore)) {
                            bestAltId = altId;
                            bestAltScore = newScore;
                        }
                        deck[slot] = orig; // revert
                    }
                    _recomputeGimmickStates(deck, remainingGimmicks); // 원래 상태로 재계산

                    if (bestAltId && isBetter(bestAltScore, currentScore)) {
                        const orig = deck[slot];
                        usedIds.delete(orig);
                        const origName = getUnitMeta(orig)?.name;
                        if (origName) usedNames.delete(origName);
                        deck[slot] = bestAltId;
                        usedIds.add(bestAltId);
                        const newName = getUnitMeta(bestAltId)?.name;
                        if (newName) usedNames.add(newName);
                        _recomputeGimmickStates(deck, remainingGimmicks);
                        improved = true;
                    }
                }
                if (!improved) break;
            }
        }

        // 잉여 멤버를 미해결 기믹 솔버로 교체
        //   원칙: boost 우선
        //     - 후보 검색: boost 솔버를 비-boost보다 우선 (boost가 같은 기믹을 풀면 boost 선택)
        //     - swap 대상: 비-boost 멤버를 우선 교체 (boost 멤버는 마지막 폴백)
        function _swapRedundantMembers(deck, remainingGimmicks, captainReqs, usedIds, usedNames, friendReqs) {
            const memberSlots = ['m1','m2','m3','m4'];
            const MAX_ITER = 3;  // 5→3 (성능 최적화, 보통 1-2회면 충분)
            const boostIdSet = new Set((boostChars || []).map(b => String(b.id)));
            const boostRankMap = new Map((boostChars || []).map(b => [String(b.id), b.rank]));
            const rankScore = r => ({A:0, B:1, C:2, D:3, E:4}[r] ?? 99);
            // 멤버 호환성: 자기 선장 + 친구선장 양쪽 모두 만족 체크
            const isCompatBoth = (id) => {
                if (!isMemberCompatibleWithCaptain(id, captainReqs)) return false;
                if (friendReqs && !friendReqs.unrestricted) {
                    if (!isMemberCompatibleWithCaptain(id, friendReqs)) return false;
                }
                return true;
            };
            for (let iter = 0; iter < MAX_ITER; iter++) {
                const unsolved = remainingGimmicks.filter(rg => !rg.solved);
                if (unsolved.length === 0) break;
                let swapMade = false;
                for (const rg of unsolved) {
                    if (rg.solved) continue;
                    // 후보 검색: 덱 외 캐릭 중 이 기믹을 (party-wide 효과로) 줄일 수 있는 최강자
                    //   boost > 비-boost (동률 시 boost 우선)
                    const deckIds = new Set(Object.values(deck).map(String).filter(Boolean));
                    const deckNames = new Set();
                    for (const did of deckIds) {
                        const u = getUnitMeta(did);
                        if (u?.name) deckNames.add(u.name);
                    }
                    let bestCand = null, bestRed = 0, bestCandNum = -1, bestIsBoost = false, bestRankScore = 99;
                    // 사전 필터링된 솔버 후보 사용 (성능 최적화: 5000+ → 수십~수백)
                    const solverIds = _getGimmickSolvers(rg.name);
                    for (const id of solverIds) {
                        if (deckIds.has(String(id))) continue;
                        const u = getUnitMeta(id);
                        if (u?.name) {
                            // 컴포넌트 공유 검사 (루피 vs 루피&브로기 등)
                            let isShared = false;
                            for (const dn of deckNames) {
                                if (_shareCharacter(u.name, dn)) { isShared = true; break; }
                            }
                            if (isShared) continue;
                        }
                        const data = window.details_kor[id];
                        // swap 후 어느 슬롯에 들어갈지 모르므로 includeSelfOnly는 보수적으로 false (party-wide 효과 위주)
                        const red = evaluateCharReductionSources(data, rg.name, 'member', { includeSelfOnly: false, round: rg.round }).max;
                        if (red <= 0) continue;
                        if (!isCompatBoth(id)) continue;
                        const idNum = parseInt(id) || 0;
                        const isBoost = boostIdSet.has(String(id));
                        const cRankScore = isBoost ? rankScore(boostRankMap.get(String(id))) : 99;
                        // 우선순위: 1) boost > 비-boost, 2) 등급 (A>B>C>D>E), 3) red 큰 것, 4) ID 큰 것
                        const better =
                            (isBoost && !bestIsBoost) ||
                            (isBoost === bestIsBoost && cRankScore < bestRankScore) ||
                            (isBoost === bestIsBoost && cRankScore === bestRankScore && red > bestRed) ||
                            (isBoost === bestIsBoost && cRankScore === bestRankScore && red === bestRed && idNum > bestCandNum);
                        if (better) {
                            bestCand = id; bestRed = red; bestCandNum = idNum; bestIsBoost = isBoost; bestRankScore = cRankScore;
                        }
                    }
                    if (!bestCand) continue;
                    const beforeUnsolvedCount = unsolved.length;
                    // 빈 슬롯이 있으면 swap 없이 그냥 채우기 (가장 간단한 개선)
                    const emptySlot = memberSlots.find(s => !deck[s]);
                    if (emptySlot) {
                        deck[emptySlot] = bestCand;
                        _recomputeGimmickStates(deck, remainingGimmicks);
                        const newUnsolved = remainingGimmicks.filter(r => !r.solved).length;
                        if (newUnsolved <= beforeUnsolvedCount) {
                            usedIds.add(bestCand);
                            const newName = getUnitMeta(bestCand)?.name;
                            if (newName) usedNames.add(newName);
                            swapMade = true;
                            break;
                        } else {
                            // 회귀 (드물긴 함)
                            deck[emptySlot] = null;
                            _recomputeGimmickStates(deck, remainingGimmicks);
                        }
                    }
                    // swap 대상 우선순위: 비-boost 멤버 슬롯부터 교체 (boost는 가능한 보존)
                    //   bestCand가 boost면 모든 슬롯 시도, 비-boost면 비-boost 슬롯에만 시도
                    const orderedSlots = [...memberSlots].sort((a, b) => {
                        const aBoost = boostIdSet.has(String(deck[a]));
                        const bBoost = boostIdSet.has(String(deck[b]));
                        return (aBoost ? 1 : 0) - (bBoost ? 1 : 0); // 비-boost 먼저
                    });
                    const preferredIdSet = new Set((preferredChars || []).map(String));
                    // A/B 등급 boost만 강하게 보호 (C/D/E는 비-boost 솔버가 더 나으면 교체 가능)
                    const protectedBoostIdSet = new Set(
                        (boostChars || []).filter(b => b.rank === 'A' || b.rank === 'B').map(b => String(b.id))
                    );
                    for (const slot of orderedSlots) {
                        const memberId = deck[slot];
                        if (!memberId) continue;
                        // 필수 캐릭 / A/B 등급 boost는 무조건 보존 (swap 대상에서 제외)
                        if (preferredIdSet.has(String(memberId))) continue;
                        if (protectedBoostIdSet.has(String(memberId))) continue;
                        // 후보가 비-boost인데 슬롯이 보호된 boost(A/B)면 swap 안함 — C/D/E는 허용
                        const orig = deck[slot];
                        deck[slot] = bestCand;
                        _recomputeGimmickStates(deck, remainingGimmicks);
                        const newUnsolved = remainingGimmicks.filter(r => !r.solved).length;
                        if (newUnsolved < beforeUnsolvedCount) {
                            // 개선 — 유지
                            usedIds.delete(orig);
                            const origName = getUnitMeta(orig)?.name;
                            if (origName) usedNames.delete(origName);
                            usedIds.add(bestCand);
                            const newName = getUnitMeta(bestCand)?.name;
                            if (newName) usedNames.add(newName);
                            swapMade = true;
                            break;
                        } else {
                            // 회귀 — 되돌림
                            deck[slot] = orig;
                            _recomputeGimmickStates(deck, remainingGimmicks);
                        }
                    }
                    if (swapMade) break;
                }
                if (!swapMade) break;
            }
        }

        // 배열 무작위 셔플 (Fisher-Yates)
        function _shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // 빌드 버튼에서 호출 — 로딩 오버레이 표시 + 비동기 청크 단위 실행 (UI 갱신 가능)
        function runAutoBuildDeck() {
            // 가드: 친구선장 필수 — 미선택 시 알림 후 중단 (탐색 범위 축소 → 성능 개선)
            if (!friendCaptainId) {
                alert('친구선장을 먼저 선택해주세요.\n친구선장이 정해져야 자기 선장과 호환되는 캐릭을 정확히 찾을 수 있습니다.');
                return;
            }
            // 기믹 패턴 변경 가능성 — 캐시 reset
            _resetGimmickSolverCache();
            const overlay = document.getElementById('loading-overlay');
            const mask = document.getElementById('loading-mask');
            const btn = document.getElementById('build-btn');
            if (overlay) overlay.classList.add('active');
            if (mask) mask.classList.add('active');
            document.body.classList.add('is-loading');
            if (btn) btn.disabled = true;
            setTimeout(() => {
                autoBuildDeckAdaptive(() => {
                    if (overlay) overlay.classList.remove('active');
                    if (mask) mask.classList.remove('active');
                    document.body.classList.remove('is-loading');
                    if (btn) btn.disabled = false;
                });
            }, 30);
        }

        // 진행률 메시지 갱신
        function _setLoadingText(msg) {
            const el = document.getElementById('loading-text');
            if (el) el.textContent = msg;
        }

        // 적응형 덱 빌드:
        //   1) 랜덤 시도 N회 (조기 종료: 모두 해결 시 즉시 stop)
        //   2) 모든 boost A + preferred + 상위 비-boost 후보를 captain으로 강제 시도
        //   3) MAX_TRIES 한도 도달까지 계속 탐색
        //   비동기 청크 단위로 실행하여 진행률 갱신
        function autoBuildDeckAdaptive(onDone) {
            const RANDOM_PHASE_TRIES = 20;       // Phase 1: 랜덤 다양성 확보
            const ABSOLUTE_MAX_TRIES = 250;       // 전체 시도 절대 상한
            const RANDOM_BUFFER = 30;             // Phase 2 후 추가 랜덤 시도 수
            const CHUNK_SIZE = 2;                 // UI 갱신 간격 (작을수록 더 자주 갱신)

            let bestList = [];
            let bestUnsolved = Infinity;
            let bestTotalRed = -Infinity;
            let triesDone = 0;
            let allSolvedFound = false;

            const tryOne = (forcedCaptainId) => {
                if (allSolvedFound) return;
                const state = _buildDeckSingle({ forcedCaptainId });
                // 시각화: 매 시도마다 현재 시도 중인 deck을 화면에 표시
                try { applyToDeck(state.deck); } catch (e) {}
                const unsolved = state.remainingGimmicks.filter(rg => !rg.solved).length;
                const totalRed = state.remainingGimmicks.reduce((s, rg) =>
                    s + Math.max(0, rg.turn - Math.max(0, rg.currentTurns)), 0);
                if (unsolved < bestUnsolved || (unsolved === bestUnsolved && totalRed > bestTotalRed)) {
                    bestList = [{ state, unsolved, totalRed }];
                    bestUnsolved = unsolved;
                    bestTotalRed = totalRed;
                } else if (unsolved === bestUnsolved && totalRed === bestTotalRed) {
                    bestList.push({ state, unsolved, totalRed });
                }
                if (bestUnsolved === 0) allSolvedFound = true;
                triesDone++;
            };

            // Captain 강제 후보 목록 (boost A + preferred만)
            //   비-boost는 Phase 1/3 랜덤에서 1-c 폴백으로만 사용 (boost A가 호환 안 될 때)
            //   ⇒ boost A 호환 캐릭이 있으면 captain은 항상 boost A
            const buildForcedCaptains = () => {
                const list = [];
                const seen = new Set();
                for (const b of (boostChars || [])) {
                    if (b.rank === 'A' && window.details_kor[b.id] && !seen.has(b.id)) {
                        list.push(b.id); seen.add(b.id);
                    }
                }
                for (const id of (preferredChars || [])) {
                    if (window.details_kor[id] && !seen.has(id)) {
                        list.push(id); seen.add(id);
                    }
                }
                // boost A가 비어있고 preferred도 없으면 비-boost 상위 캐릭들도 captain 후보로 시도
                //   친구호환 가능 + 캡틴/필살기로 기믹 솔빙 가능자 우선, 그 다음 mult 순
                const aRankAvailable = (boostChars || []).some(b => b.rank === 'A' && window.details_kor[b.id]);
                if (!aRankAvailable) {
                    const boostIdSet = new Set((boostChars || []).map(b => String(b.id)));
                    // 친구호환 사전 검사용 reqs (가벼운 필터)
                    let preFriendReqs = null;
                    if (friendCaptainId && window.details_kor[friendCaptainId]) {
                        preFriendReqs = extractCaptainRequirements(window.details_kor[friendCaptainId].captain);
                    }
                    const isPreCompat = (id) => {
                        if (!preFriendReqs || preFriendReqs.unrestricted) return true;
                        return isMemberCompatibleWithCaptain(id, preFriendReqs);
                    };
                    const allCands = [];
                    for (const id in window.details_kor) {
                        if (boostIdSet.has(String(id)) || seen.has(id)) continue;
                        const data = window.details_kor[id];
                        if (!data?.captain) continue;
                        const mult = getAttackMultiplier(data.captain);
                        if (mult <= 0) continue;
                        if (!isPreCompat(id)) continue;
                        allCands.push({ id, mult, idNum: parseInt(id) || 0 });
                    }
                    // ID 내림차순 (신규 캐릭 우선) — 모두 추가, MAX_TRIES가 자연스러운 한도
                    allCands.sort((a, b) => b.idNum - a.idNum);
                    for (const c of allCands) {
                        if (!seen.has(c.id)) { list.push(c.id); seen.add(c.id); }
                    }
                }
                return list;
            };

            const forcedCaptains = buildForcedCaptains();
            let forcedIdx = 0;
            // 동적 MAX_TRIES — 탐색 공간 크기에 비례
            //   = Phase 1 랜덤 + 강제 캡틴 수 + 추가 랜덤 (단, ABSOLUTE_MAX 상한)
            //   A/B 등급만 있어 forcedCaptains가 적으면 시도 수도 적음 (빠른 종료)
            const MAX_TRIES = Math.min(ABSOLUTE_MAX_TRIES,
                RANDOM_PHASE_TRIES + forcedCaptains.length + RANDOM_BUFFER);

            // 청크 단위 실행 함수 (재귀적 setTimeout)
            const runChunk = () => {
                const chunkStart = triesDone;
                const chunkEnd = Math.min(triesDone + CHUNK_SIZE, MAX_TRIES);

                // Phase 1: 랜덤 시도
                while (triesDone < chunkEnd && triesDone < RANDOM_PHASE_TRIES && !allSolvedFound) {
                    tryOne(null);
                }
                // Phase 2: 강제 captain 시도
                while (triesDone < chunkEnd && triesDone < MAX_TRIES && !allSolvedFound && forcedIdx < forcedCaptains.length) {
                    tryOne(forcedCaptains[forcedIdx]);
                    forcedIdx++;
                }
                // Phase 3: 추가 랜덤 시도 (강제 다 끝나도 미해결 남으면)
                while (triesDone < chunkEnd && triesDone < MAX_TRIES && !allSolvedFound) {
                    tryOne(null);
                }

                if (!allSolvedFound && triesDone < MAX_TRIES) {
                    setTimeout(runChunk, 0);
                } else {
                    finalize();
                }
            };

            const finalize = () => {
                const pick = bestList[Math.floor(Math.random() * bestList.length)];
                _setLoadingText('최적화 중...');
                applyToDeck(pick.state.deck);
                // 집중 최적화: BEST deck에 hill climbing으로 멤버 swap 시도 (비동기)
                //   각 슬롯 swap 시 시각화 — 슬롯 강조 + 캐릭 변경 보임
                let captainReqs, friendReqs, usedIds, usedNames;
                try {
                    captainReqs = extractCaptainRequirements(window.details_kor[pick.state.deck.c1]?.captain);
                    const friendId = pick.state.deck.f1;
                    friendReqs = friendId && window.details_kor[friendId]
                        ? extractCaptainRequirements(window.details_kor[friendId].captain) : null;
                    usedIds = new Set();
                    usedNames = new Set();
                    for (const [slot, id] of Object.entries(pick.state.deck)) {
                        if (!id) continue;
                        if (slot === 'f1' && String(pick.state.deck.c1) === String(id)) continue;
                        usedIds.add(id);
                        const name = getUnitMeta(id)?.name;
                        if (name) usedNames.add(name);
                    }
                } catch (e) { console.warn('Optimize setup failed:', e); }

                _intensiveOptimizeAsync(pick.state.deck, pick.state.remainingGimmicks, captainReqs, friendReqs, usedIds, usedNames, () => {
                    window.__supportFitNote = pick.state.supportFitNote;
                    window.__lastDeck = pick.state.deck;
                    window.__lastGimmicks = pick.state.remainingGimmicks;
                    console.log('=== DECK BUILD COMPLETE ===');
                    console.log(`Tries: ${triesDone}/${MAX_TRIES}, Unsolved: ${bestUnsolved}, TotalRed: ${bestTotalRed}`);
                    console.log('Deck:', JSON.stringify(pick.state.deck));
                    console.log('Mains:', ['c1','f1','m1','m2','m3','m4'].map(s => `${s}:${pick.state.deck[s]||'-'}(${getUnitMeta(pick.state.deck[s])?.name||''})`).join(', '));
                    console.log('Unsolved:', pick.state.remainingGimmicks.filter(g => !g.solved).map(g => `${g.name} ${g.turn}턴 (남은${g.currentTurns}, round${g.round})`));
                    applyToDeck(pick.state.deck);
                    analyzeGimmickSolutions(pick.state.deck);
                    if (onDone) onDone();
                });
            };

            runChunk();
        }

        // 더 좋은 점수인지 (낮은 unsolved, 높은 totalRed)
        function _scoreLess(unsolved, totalRed, current) {
            if (unsolved < current.unsolved) return true;
            if (unsolved > current.unsolved) return false;
            return totalRed > current.totalRed;
        }

        function _buildDeckSingle(opts = {}) {
            // boost 캐릭이 없어도 진행 — 전체 캐릭터로 폴백 매칭됨
            // opts.forcedCaptainId: 지정 시 그 ID를 자기 선장으로 강제 (1-a 우회)
            const forcedCaptainId = opts.forcedCaptainId || null;
            let deck = { f1: null, c1: null, m1: null, m2: null, m3: null, m4: null, s1: null, s2: null, s3: null, s4: null, s5: null };
            let usedIds = new Set();
            let usedNames = new Set();
            let remainingGimmicks = [];

            for(let r=2; r<=currentMaxRound; r++) {
                activeGimmicks[r].forEach(g => {
                    let initialTurns = g.turn;
                    if (g.name === "선장효과 무효" || g.name === "봉쇄") initialTurns = Math.max(0, initialTurns - 3);
                    // 즉발 기믹(원래 turn=0)은 회복 효과 commit이 실제로 필요 → unsolved로 시작
                    const isInstant = g.turn === 0;
                    // 방어력 감소 무효는 보스 선제 패턴 (해제 불가, 다른 기믹 평가에 영향만 줌) → 자동 solved
                    const isAutoSolved = g.name === "방어력 감소 무효";
                    const solved = isAutoSolved ? true : (isInstant ? false : (initialTurns <= 0));
                    remainingGimmicks.push({ ...g, currentTurns: initialTurns, solved, round: r });
                });
            }

            const isDuplicate = (id) => {
                const charData = window.details_kor[id];
                if (!charData) return true;
                if (usedIds.has(id)) return true;
                const name = getUnitMeta(id)?.name;
                if (!name) return false;
                // 정확 일치 또는 컴포넌트 공유 (루피 vs 루피&브로기 등)
                for (const usedName of usedNames) {
                    if (_shareCharacter(name, usedName)) return true;
                }
                return false;
            };

            const fillSlot = (id, isCaptain) => {
                const data = window.details_kor[id];
                let assignedSlot = null;
                if (isCaptain) {
                    deck.c1 = id;
                    assignedSlot = 'c1';
                    // f1(친구선장)은 1-aa에서 effectiveFriendId 기준으로 단일 설정
                }
                else {
                    const slot = ['m1', 'm2', 'm3', 'm4'].find(s => !deck[s]);
                    if (slot) { deck[slot] = id; assignedSlot = slot; }
                    else return false;
                }
                usedIds.add(id);
                const uname = getUnitMeta(id)?.name;
                if (uname) usedNames.add(uname);
                remainingGimmicks.forEach(rg => {
                    if (rg.solved) return;
                    const role = isCaptain ? 'captain' : 'member';
                    const isPartyWide = !rg.scope || (rg.scope.row === 'all' && rg.scope.col === 'all');
                    const inScope = isSlotAffected(assignedSlot, rg.scope);
                    // self-only 효과는 positional 기믹 + 슬롯 in scope일 때만 카운트
                    // party-wide 기믹은 self-only로 해결 안 됨 (자기 자신만 회복되고 나머지 일당은 그대로)
                    const includeSelfOnly = !isPartyWide && inScope;
                    const rewindHere = remainingGimmicks.some(other =>
                        other.round === rg.round &&
                        other.name === '필살기 턴 되돌리기' &&
                        isSlotAffected(assignedSlot, other.scope)
                    );
                    const sailorTxt = data?.sailor ? Object.values(data.sailor).join('. ') : '';
                    const hasSelfRewindRecov = sailorTxt.includes('필살기 턴 되돌리기') && /자신/.test(sailorTxt);
                    const suppressSpecial = rg.name !== '필살기 턴 되돌리기' && rewindHere && !hasSelfRewindRecov;
                    const { max } = evaluateCharReductionSources(data, rg.name, role, { includeSelfOnly, suppressSpecial, round: rg.round });
                    rg.currentTurns -= max;
                    if (rg.currentTurns <= 0) rg.solved = true;
                });
                return true;
            };

            // 1. 특별효과 캐릭터로 메인 파티 구성
            //    선장은 등급(A>B>C) → 공격 배수 내림차순 으로 가장 강한 캐릭터를 우선 선정
            const rankOrder = { A: 0, B: 1, C: 2 };
            const candidates = boostChars
                .filter(c => window.details_kor[c.id])
                .map(c => ({
                    ...c,
                    multiplier: getAttackMultiplier(window.details_kor[c.id]?.captain)
                }))
                .sort((a, b) => {
                    const r = (rankOrder[a.rank] ?? 99) - (rankOrder[b.rank] ?? 99);
                    if (r !== 0) return r;
                    const m = b.multiplier - a.multiplier;
                    if (m !== 0) return m;
                    return Math.random() - 0.5; // 동률 랜덤 tiebreak
                });

            // 1-a. 선장 선정 (계층적 우선순위): 등급 → captain 기믹 해제 가능 → 공격 배수
            //   - 모든 boost 등급(A→B→C→D→E)을 순차적으로 시도
            //   - 각 등급 내에서 solver 우선, 없으면 동급 어떤 후보든
            //   - boost로 선장 못 찾으면 1-c에서 비-boost 폴백
            const ranksPresent = ['A', 'B', 'C', 'D', 'E'].filter(r =>
                candidates.some(c => c.rank === r && !isDuplicate(c.id))
            );
            const topRank = ranksPresent[0];
            const topRankCandidates = candidates.filter(c => c.rank === topRank && !isDuplicate(c.id));
            const topRankSolvers = topRankCandidates.filter(c => {
                const data = window.details_kor[c.id];
                return remainingGimmicks.some(rg =>
                    !rg.solved && evaluateCharReductionSources(data, rg.name, 'captain', { round: rg.round }).max > 0
                );
            });

            // 상위 N명 후보 중 랜덤 선택으로 다양성 부여 (N-tries에서 여러 captain 탐색)
            //   동일 multiplier가 있으면 그 tier 내 랜덤
            //   동률 없으면 상위 3명 중 랜덤 (multiplier가 다르더라도)
            const pickFromTier = (list) => {
                if (!list || list.length === 0) return null;
                const top = list[0];
                const tier = list.filter(c => c.multiplier === top.multiplier);
                if (tier.length > 1) return tier[Math.floor(Math.random() * tier.length)];
                // 동률 없으면 상위 3명까지 확장 (top-3 random)
                const topN = Math.min(3, list.length);
                return list[Math.floor(Math.random() * topN)];
            };
            // 친구선장 자동 선택: 사용자가 친구선장 지정 안 했다면 boost A 등급에서 자동 선택
            //   - 솔버 우선 → 솔버 없으면 mult 가장 높은 A 등급
            //   - forcedCaptainId(자기 선장 강제)와 다른 캐릭 우선 (mirror 회피, 단 후보 없으면 같아도 OK)
            let effectiveFriendId = friendCaptainId;
            if (!effectiveFriendId) {
                const aCands = candidates.filter(c => c.rank === 'A');
                if (aCands.length > 0) {
                    const aSolvers = aCands.filter(c => {
                        const d = window.details_kor[c.id];
                        return remainingGimmicks.some(rg =>
                            !rg.solved && evaluateCharReductionSources(d, rg.name, 'captain', { round: rg.round }).max > 0
                        );
                    });
                    const pool = aSolvers.length > 0 ? aSolvers : aCands;
                    const nonForced = pool.filter(c => String(c.id) !== String(forcedCaptainId));
                    effectiveFriendId = (nonForced.length > 0 ? nonForced[0] : pool[0]).id;
                }
            }

            // 친구선장 호환성 필터: 친구선장이 있으면 자기 선장도 친구의 공격/체력 배수를 온전히 받는 type/class 필요
            //   boost에 호환자가 없으면 1-c 폴백(전체 캐릭)에서 호환 캐릭 검색
            let friendReqs = null;
            if (effectiveFriendId && window.details_kor[effectiveFriendId]) {
                friendReqs = extractCaptainRequirements(window.details_kor[effectiveFriendId].captain);
            }
            const friendCompatActive = friendReqs && !friendReqs.unrestricted;
            const isCompatWithFriend = (charId) => {
                if (!friendCompatActive) return true;
                return isMemberCompatibleWithCaptain(charId, friendReqs);
            };
            // 선장 선정 (A 등급 boost만 우선 시도)
            //   A 등급에서 친구호환 캐릭만 후보 (솔버 우선 → 비-솔버)
            //   A에서 못 찾으면 그대로 두고, 이후 1-bb(필수 캐릭) 또는 1-c(비-boost 전체)에서 채움
            //   ⇒ B/C/D/E 등급은 선장 후보 아님 (멤버에서만 사용)
            //   forcedCaptainId가 지정되면 그 ID를 강제로 선장으로 사용
            let captainPick = null;
            if (forcedCaptainId && window.details_kor[forcedCaptainId] && !isDuplicate(forcedCaptainId)) {
                captainPick = { id: forcedCaptainId };
            } else {
                const aRankCands = candidates.filter(c => c.rank === 'A' && !isDuplicate(c.id));
                const compatA = friendCompatActive
                    ? aRankCands.filter(c => isCompatWithFriend(c.id))
                    : aRankCands;
                if (compatA.length > 0) {
                    const compatSolversA = compatA.filter(c => {
                        const d = window.details_kor[c.id];
                        return remainingGimmicks.some(rg =>
                            !rg.solved && evaluateCharReductionSources(d, rg.name, 'captain', { round: rg.round }).max > 0
                        );
                    });
                    captainPick = pickFromTier(compatSolversA) || pickFromTier(compatA);
                }
            }
            if (captainPick) {
                fillSlot(captainPick.id, true);
            }

            // 1-aa. 친구선장 처리
            //   친구선장은 별개 슬롯 — 사용자 미지정 시 자동 선택된 effectiveFriendId 사용
            //   usedIds/usedNames에 추가하지 않음 (자기 선장/멤버/서포트로 다시 쓸 수 있음)
            //   captain 효과로 기믹 감소만 추가 적용
            if (effectiveFriendId) {
                deck.f1 = String(effectiveFriendId);
                if (window.details_kor[effectiveFriendId] && String(effectiveFriendId) !== String(deck.c1)) {
                    const friendData = window.details_kor[effectiveFriendId];
                    remainingGimmicks.forEach(rg => {
                        if (rg.solved) return;
                        const isPartyWide = !rg.scope || (rg.scope.row === 'all' && rg.scope.col === 'all');
                        const inScope = isSlotAffected('f1', rg.scope);
                        const includeSelfOnly = !isPartyWide && inScope;
                        const rewindHere = remainingGimmicks.some(other =>
                            other.round === rg.round &&
                            other.name === '필살기 턴 되돌리기' &&
                            isSlotAffected('f1', other.scope)
                        );
                        const sailorTxt = friendData?.sailor ? Object.values(friendData.sailor).join('. ') : '';
                        const hasSelfRewindRecov = sailorTxt.includes('필살기 턴 되돌리기') && /자신/.test(sailorTxt);
                        const suppressSpecial = rg.name !== '필살기 턴 되돌리기' && rewindHere && !hasSelfRewindRecov;
                        const { max } = evaluateCharReductionSources(friendData, rg.name, 'captain', { includeSelfOnly, suppressSpecial, round: rg.round });
                        rg.currentTurns -= max;
                        if (rg.currentTurns <= 0) rg.solved = true;
                    });
                }
            } else if (deck.c1 && !deck.f1) {
                deck.f1 = deck.c1;
            }

            // 1-bb. Preferred 강제 포함 (boost member 채우기 이전 — 무조건 덱에 들어감)
            //   - 선장이 비어있고 preferred에 captain 후보 있으면 가장 강한 후보를 선장으로
            //   - 빈 선원 슬롯에 preferred를 모두 강제 배치
            const validPreferred = preferredChars
                .filter(id => window.details_kor[id])
                .map(id => ({
                    id,
                    mult: getAttackMultiplier(window.details_kor[id]?.captain || '')
                }));

            if (!deck.c1 && validPreferred.length > 0) {
                const captainSolvers = validPreferred.filter(p => {
                    const d = window.details_kor[p.id];
                    return remainingGimmicks.some(rg =>
                        !rg.solved && evaluateCharReductionSources(d, rg.name, 'captain', { round: rg.round }).max > 0
                    );
                }).sort((a, b) => b.mult - a.mult);
                const anyByMult = [...validPreferred].sort((a, b) => b.mult - a.mult);
                const captainPickFromPref = captainSolvers[0] || anyByMult.find(p => p.mult > 0);
                if (captainPickFromPref && !isDuplicate(captainPickFromPref.id)) {
                    fillSlot(captainPickFromPref.id, true);
                }
            }

            // 1-b. 선원 선정 (max-coverage greedy)
            //   captain 요구사항 추출 (선장이 preferred로 채워졌을 수도)
            const captainData = window.details_kor[deck.c1];
            const captainReqs = extractCaptainRequirements(captainData?.captain);
            const memberSlotKeys = ['m1', 'm2', 'm3', 'm4'];
            const hasEmptyMemberSlot = () => memberSlotKeys.some(s => !deck[s]);
            // 멤버 호환성: 자기 선장 + 친구선장 양쪽 모두 만족해야 진정한 호환
            //   (둘 다 type/class 매칭 시 두 captain 효과 모두 받음)
            const isMemberCompatibleWithBoth = (memberId) => {
                if (!isMemberCompatibleWithCaptain(memberId, captainReqs)) return false;
                if (friendReqs && !friendReqs.unrestricted) {
                    if (!isMemberCompatibleWithCaptain(memberId, friendReqs)) return false;
                }
                return true;
            };

            // 1-bb-2) Preferred 멤버 강제 채우기 (boost 채우기 이전)
            //   1) 양쪽 captain 호환 preferred → 빈 선원 슬롯에 즉시 배치
            validPreferred.forEach(p => {
                if (isDuplicate(p.id)) return;
                if (!hasEmptyMemberSlot()) return;
                if (isMemberCompatibleWithBoth(p.id)) fillSlot(p.id, false);
            });
            //   2) 미호환 preferred (어쨌든 강제 포함)
            validPreferred.forEach(p => {
                if (isDuplicate(p.id)) return;
                if (!hasEmptyMemberSlot()) return;
                fillSlot(p.id, false);
            });

            // 1-bb-3) A/B 등급 boost 강제 멤버 배치 (필수 캐릭처럼 취급)
            //   captain으로 이미 사용된 캐릭은 isDuplicate로 자동 스킵됨
            //   A 먼저 → B 순으로 채워서 등급 우선 보장
            for (const rank of ['A', 'B']) {
                for (const c of candidates) {
                    if (c.rank !== rank) continue;
                    if (isDuplicate(c.id)) continue;
                    if (!hasEmptyMemberSlot()) break;
                    fillSlot(c.id, false);
                }
            }

            // 1-b-1) 등급 순(A→B→C→D→E) 멤버 채우기 — 등급이 절대 우선
            //   각 등급 안에서: 솔버(미해결 기믹 해제 가능자) 우선 → 비-솔버 순
            //   현 등급의 모든 후보(솔버+비솔버) 소진 후에야 다음 등급으로 이동
            //   ⇒ A의 비-솔버가 B의 솔버보다 먼저 (rank가 절대 우선)
            const shuffledCandidates = _shuffle(candidates);
            const tryFillFromRank = (rank, requireSolver) => {
                while (hasEmptyMemberSlot()) {
                    let best = null, bestCov = -1, bestMult = -1;
                    for (const c of shuffledCandidates) {
                        if (c.rank !== rank) continue;
                        if (isDuplicate(c.id)) continue;
                        if (!isMemberCompatibleWithBoth(c.id)) continue;
                        const data = window.details_kor[c.id];
                        let cov = 0;
                        for (const rg of remainingGimmicks) {
                            if (rg.solved) continue;
                            const red = evaluateCharReductionSources(data, rg.name, 'member', { round: rg.round }).max;
                            if (red > 0) cov++;
                        }
                        if (requireSolver && cov === 0) continue;
                        const m = c.multiplier ?? 0;
                        if (cov > bestCov || (cov === bestCov && m > bestMult)) {
                            best = c; bestCov = cov; bestMult = m;
                        }
                    }
                    if (!best) break;
                    fillSlot(best.id, false);
                }
            };
            // 등급별로: 솔버 → 비-솔버 → 다음 등급
            for (const rank of ['A', 'B', 'C', 'D', 'E']) {
                if (!hasEmptyMemberSlot()) break;
                tryFillFromRank(rank, true);   // 이 등급의 솔버 먼저
                if (!hasEmptyMemberSlot()) break;
                tryFillFromRank(rank, false);  // 이 등급의 비-솔버
            }

            // 1-c. 폴백: boost 외 전체 캐릭터에서 보충
            //      - 선장이 비어있다면 가장 강한(공격배수 높은) 비-boost 캐릭으로 채움 (기믹 해결 가능자 우선)
            //      - 빈 선원 슬롯이 있고 미해결 기믹이 있다면, 각 기믹별로 해결 가능한 비-boost 캐릭 1명씩 보충
            const boostIdSet = new Set(boostChars.map(b => String(b.id)));

            if (!deck.c1) {
                // ID 내림차순으로 비-boost 캐릭 탐색 (신규 우선)
                //   - solver 우선, 없으면 mult 양수인 강캐 폴백
                //   - 동등 조건에서는 ID 큰 것 (신규) 우선
                let bestSolver = null, bestSolverNum = -1, bestSolverMult = -1;
                let bestAny = null, bestAnyNum = -1, bestAnyMult = -1;
                for (const id in window.details_kor) {
                    if (boostIdSet.has(String(id))) continue;
                    if (friendCompatActive && !isCompatWithFriend(id)) continue;
                    const data = window.details_kor[id];
                    if (!data?.captain) continue;
                    const mult = getAttackMultiplier(data.captain);
                    if (mult <= 0) continue;
                    const solves = remainingGimmicks.some(rg =>
                        !rg.solved && evaluateCharReductionSources(data, rg.name, 'captain', { round: rg.round }).max > 0
                    );
                    const idNum = parseInt(id) || 0;
                    // ID 큰(신규) 우선, 동률 시 mult 큰 것
                    if (solves && (idNum > bestSolverNum || (idNum === bestSolverNum && mult > bestSolverMult))) {
                        bestSolver = id; bestSolverNum = idNum; bestSolverMult = mult;
                    }
                    if (idNum > bestAnyNum || (idNum === bestAnyNum && mult > bestAnyMult)) {
                        bestAny = id; bestAnyNum = idNum; bestAnyMult = mult;
                    }
                }
                const pick = bestSolver || bestAny;
                if (pick && !isDuplicate(pick)) {
                    fillSlot(pick, true);
                }
            }

            // 1-c-fallback. 친구선장 호환 필터로 인해 선장이 끝까지 비어있다면, 호환성을 무시하고 최후 폴백
            //   - 친구선장 효과를 못 받더라도 덱이 비어있는 것보다는 낫다
            if (!deck.c1 && friendCompatActive) {
                const fallbackPick = pickFromTier(topRankSolvers) || pickFromTier(topRankCandidates);
                if (fallbackPick && !isDuplicate(fallbackPick.id)) {
                    fillSlot(fallbackPick.id, true);
                } else {
                    // boost에도 없으면 전체 DB에서 (호환 무시)
                    let bestAny = null, bestAnyMult = -1, bestAnyNum = -1;
                    for (const id in window.details_kor) {
                        if (boostIdSet.has(String(id))) continue;
                        const data = window.details_kor[id];
                        if (!data?.captain) continue;
                        const mult = getAttackMultiplier(data.captain);
                        if (mult <= 0) continue;
                        const idNum = parseInt(id) || 0;
                        if (mult > bestAnyMult || (mult === bestAnyMult && idNum > bestAnyNum)) {
                            bestAny = id; bestAnyMult = mult; bestAnyNum = idNum;
                        }
                    }
                    if (bestAny && !isDuplicate(bestAny)) fillSlot(bestAny, true);
                }
                if (deck.c1 && !deck.f1) deck.f1 = effectiveFriendId ? String(effectiveFriendId) : deck.c1;
            }

            // 1-d. boost 미호환 폴백 (등급 순으로 채워도 빈 슬롯 남았을 때 마지막 시도)
            //   1-b-1에서는 호환되는 boost만 채웠음 → 미호환이라도 boost를 우선 (어쨌든 boost가 좋음)
            for (const rank of ['A', 'B', 'C', 'D', 'E']) {
                if (!hasEmptyMemberSlot()) break;
                shuffledCandidates.forEach(c => {
                    if (c.rank !== rank) return;
                    if (isDuplicate(c.id)) return;
                    if (!hasEmptyMemberSlot()) return;
                    fillSlot(c.id, false);
                });
            }

            // 1-c-member. 비-boost 멤버 폴백: boost가 부족해서 빈 슬롯이 남았을 때만 비-boost로 보충
            //   각 미해결 기믹별로 비-boost 솔버 1명씩 보충
            //   (1-d 이후 boost가 충분하면 빈 슬롯 없음 → 작동 안함)
            const memberSlots = ['m1', 'm2', 'm3', 'm4'];
            const captainReqsForFallback = extractCaptainRequirements(window.details_kor[deck.c1]?.captain);

            remainingGimmicks.forEach(rg => {
                if (rg.solved) return;
                if (!memberSlots.some(s => !deck[s])) return; // 빈 선원 슬롯 없음
                let bestCompat = null, bestCompatRed = 0, bestCompatMult = -1, bestCompatNum = -1;
                let bestAny = null, bestAnyRed = 0, bestAnyMult = -1, bestAnyNum = -1;

                // 사전 필터링된 솔버 후보 사용 (성능 최적화)
                //   비-boost 폴백 — ID 큰(신규) 캐릭 우선, 동률 시 red 큰 것 → mult 큰 것
                const solverIds = _getGimmickSolvers(rg.name);
                for (const id of solverIds) {
                    if (boostIdSet.has(String(id))) continue;
                    if (isDuplicate(id)) continue;
                    const data = window.details_kor[id];
                    const evalRes = evaluateCharReductionSources(data, rg.name, 'member', { round: rg.round });
                    if (evalRes.max <= 0) continue;
                    const mult = getAttackMultiplier(data.captain || '');
                    const compat = isMemberCompatibleWithCaptain(id, captainReqsForFallback);
                    const idNum = parseInt(id) || 0;
                    // ID 큰(신규) 우선 → red 큰 것 → mult 큰 것
                    const compatBetter = idNum > bestCompatNum
                        || (idNum === bestCompatNum && evalRes.max > bestCompatRed)
                        || (idNum === bestCompatNum && evalRes.max === bestCompatRed && mult > bestCompatMult);
                    if (compat && compatBetter) {
                        bestCompat = id; bestCompatRed = evalRes.max; bestCompatMult = mult; bestCompatNum = idNum;
                    }
                    const anyBetter = idNum > bestAnyNum
                        || (idNum === bestAnyNum && evalRes.max > bestAnyRed)
                        || (idNum === bestAnyNum && evalRes.max === bestAnyRed && mult > bestAnyMult);
                    if (anyBetter) {
                        bestAny = id; bestAnyRed = evalRes.max; bestAnyMult = mult; bestAnyNum = idNum;
                    }
                }
                const pick = bestCompat || bestAny;
                if (pick) {
                    fillSlot(pick, false);
                }
            });

            // 1-e. Swap pass: 미해결 기믹이 남고 멤버 슬롯이 모두 차있으면
            //      잉여 멤버(제거해도 다른 기믹이 모두 그대로 solved 유지되는 멤버)를 미해결 기믹 솔버로 교체
            //      (boost로 채워진 슬롯 중 redundant한 것을 비-boost 솔버로 교체)
            _swapRedundantMembers(deck, remainingGimmicks, captainReqs, usedIds, usedNames, friendReqs);

            // 1-f. 정확한 미해결 기믹 상태 재계산 (per-round 필살기 커밋 추적)
            //      서포트 매칭이 실제 미해결 기믹에만 동작하도록 함
            _recomputeGimmickStates(deck, remainingGimmicks);

            // 2. 남은 기믹 해결을 위한 서포트 캐릭터 배치
            const baseSlotKeys = ['c1', 'm1', 'm2', 'm3', 'm4']; // 서포트를 붙일 수 있는 메인 슬롯들
            
            // 서포트 매칭 후보 수집 (한 기믹 → 후보 리스트, strict 우선)
            const looseMatches = []; // { rg, sId, redTurns } — 1차에서 strict로 못 채운 후보들
            const supportFitNote = {}; // sId → 'loose' 표시용

            // 서포트 후보 ID — 서포트 엔트리가 있는 캐릭만 미리 필터링 (성능 최적화)
            //   매 시도마다 재계산되지 않도록 module-level 캐시 사용
            if (!window.__supportIdsCache) {
                const filtered = [];
                for (const id in window.details_kor) {
                    const sData = window.details_kor[id];
                    if (getSupportEntries(sData).length > 0) filtered.push(id);
                }
                window.__supportIdsCache = filtered;
            }
            const allSupportIds = _shuffle(window.__supportIdsCache);
            // 처리 우선순위: 포지셔널 기믹 우선 (지정 슬롯에만 영향이라 매칭 제약), 큰 회복 필요 우선
            const sortedUnsolvedGimmicks = remainingGimmicks
                .filter(rg => !rg.solved)
                .sort((a, b) => {
                    const aPos = a.scope && (a.scope.row !== 'all' || a.scope.col !== 'all') ? 1 : 0;
                    const bPos = b.scope && (b.scope.row !== 'all' || b.scope.col !== 'all') ? 1 : 0;
                    if (aPos !== bPos) return bPos - aPos; // positional 우선
                    return (b.currentTurns ?? 0) - (a.currentTurns ?? 0); // 큰 부족분 우선
                });
            sortedUnsolvedGimmicks.forEach(rg => {
                const isPartyWide = !rg.scope || (rg.scope.row === 'all' && rg.scope.col === 'all');
                for (const sId of allSupportIds) {
                    if (isDuplicate(sId)) continue;
                    const sData = window.details_kor[sId];
                    const entries = getSupportEntries(sData);
                    if (entries.length === 0) continue;

                    // 모든 (entry, slot) 조합 평가 — 정확한 scope 반영 (evaluateSupportContribution 사용)
                    //   strict 매칭 우선, loose는 후보로만 보관
                    let strictBest = null;  // {entry, red, slotIdx, target}
                    let looseBest = null;
                    for (const e of entries) {
                        for (let i = 0; i < baseSlotKeys.length; i++) {
                            const mainId = deck[baseSlotKeys[i]];
                            const supportSlot = `s${i + 1}`;
                            if (!mainId || deck[supportSlot]) continue;
                            const fit = checkSupportFit(e.target, mainId);
                            if (fit === 'reject') continue;
                            const pairedMainAffected = isSlotAffected(baseSlotKeys[i], rg.scope);
                            const r = evaluateSupportContribution(e.effect, rg.name, pairedMainAffected, isPartyWide);
                            if (r.turns <= 0) continue;
                            const cand = { red: r.turns, slotIdx: i, target: e.target };
                            if (fit === 'strict') {
                                if (!strictBest || r.turns > strictBest.red) strictBest = cand;
                            } else if (fit === 'loose') {
                                if (!looseBest || r.turns > looseBest.red) looseBest = cand;
                            }
                        }
                    }

                    // strict 매칭 즉시 배치
                    if (strictBest) {
                        const supportSlot = `s${strictBest.slotIdx + 1}`;
                        deck[supportSlot] = sId;
                        usedIds.add(sId);
                        rg.currentTurns -= strictBest.red;
                        if (rg.currentTurns <= 0) rg.solved = true;
                    } else if (looseBest) {
                        // strict 후보 없으면 loose 후보로 보관 (2차에서 사용)
                        looseMatches.push({ rg, sId, redTurns: looseBest.red, target: looseBest.target, slotIdx: looseBest.slotIdx });
                    }
                    if (rg.solved) break;
                }
            });

            // 2차: loose 후보로 빈 서포트 슬롯 채우기 (저장된 slotIdx에 직접 배치)
            looseMatches.forEach(({ rg, sId, redTurns, target, slotIdx }) => {
                if (rg.solved || isDuplicate(sId)) return;
                const supportSlot = `s${slotIdx + 1}`;
                const mainId = deck[baseSlotKeys[slotIdx]];
                if (!mainId || deck[supportSlot]) return;
                if (checkSupportFit(target, mainId) === 'reject') return;
                deck[supportSlot] = sId;
                usedIds.add(sId);
                supportFitNote[sId] = 'loose';
                rg.currentTurns -= redTurns;
                if (rg.currentTurns <= 0) rg.solved = true;
            });
            return { deck, supportFitNote, remainingGimmicks };
        }

        function analyzeGimmickSolutions(deck) {
            const analysisArea = document.getElementById('deck-analysis');
            analysisArea.style.display = 'block';
            let html = '';
            const slotNames = { f1: '친구선장', c1: '선장', m1: '선원1', m2: '선원2', m3: '선원3', m4: '선원4', s1: '서포트1', s2: '서포트2', s3: '서포트3', s4: '서포트4', s5: '서포트5' };
            let specialUsedTracker = {}; // slot → 마지막 사용 라운드 (슬롯 단위 추적)
            let specialUsedCount = {};   // slot → 누적 사용 횟수 (슬롯 단위 추적)
            let supportUsedTracker = {}; // 서포트도 모험 1회 발동 — 라운드 추적
            const captainReqs = extractCaptainRequirements(window.details_kor[deck.c1]?.captain);

            // 덱에 슬롯 고정 + 변환 불가 슬롯 생성 효과 보유자 검색
            // 두 효과가 모두 있어야 슬롯 변환 기믹 무효화 ([RAINBOW]/[WANO]/[셈라] + 고정)
            const slotLockHolders = [];
            const unconvertibleSlotHolders = [];
            for (const [slot, id] of Object.entries(deck)) {
                if (!id) continue;
                if (slot === 'f1' && String(deck.c1) === String(id)) continue;
                const name = getUnitMeta(id)?.name || `ID${id}`;
                if (_hasSlotLockEffect(id)) slotLockHolders.push(name);
                if (_hasUnconvertibleSlotGen(id)) unconvertibleSlotHolders.push(name);
            }
            const slotConvImmuneByDeck = slotLockHolders.length > 0 && unconvertibleSlotHolders.length > 0;

            for(let round=2; round<=currentMaxRound; round++){
                const roundGimmicks = activeGimmicks[round];
                if (!roundGimmicks || roundGimmicks.length === 0) continue;

                // 이 라운드에 필살기 턴 되돌리기가 걸리는 슬롯 식별
                const rewindGimmicks = roundGimmicks.filter(g => g.name === '필살기 턴 되돌리기');
                const isSlotRewound = (slot) => rewindGimmicks.some(rg => isSlotAffected(slot, rg.scope));
                const hasSelfRewindRecov = (id) => {
                    const d = window.details_kor[id];
                    if (!d?.sailor) return false;
                    const txt = Object.values(d.sailor).join('. ');
                    return txt.includes('필살기 턴 되돌리기') && /자신/.test(txt);
                };

                html += `<div class="solution-round"><h3>BATTLE ${round} 해결 분석</h3>`;
                roundGimmicks.forEach(g => {
                    let solvers = [];
                    let totalReduced = 0;
                    // 방어력 감소 무효: 보스 선제 패턴 — 출력에서 숨김 (다른 기믹 평가에만 영향)
                    if (g.name === "방어력 감소 무효") return;
                    if (g.name === "선장효과 무효" || g.name === "봉쇄") { solvers.push(`능력해방(3턴)`); totalReduced += 3; }
                    // 슬롯 변환 기믹: 슬롯 고정 + 변환 불가 슬롯([RAINBOW]/[WANO]/[셈라]) 생성 둘 다 있어야 면역
                    let slotLockedImmune = false;
                    if (_isSlotConversionGimmick(g.name) && slotConvImmuneByDeck) {
                        solvers.push(`[슬롯 고정+변환불가 슬롯] ${slotLockHolders.join(',')} / ${unconvertibleSlotHolders.join(',')}`);
                        slotLockedImmune = true;
                    }
                    const isPartyWide = !g.scope || (g.scope.row === 'all' && g.scope.col === 'all');

                    // 1단계: 각 슬롯의 비-필살기 contribution + 서포트 contribution 수집
                    //         + 필살기 후보(아직 다른 라운드에서 안 쓴 경우) 대기열 작성
                    const renderItems = []; // 즉시 렌더할 솔버 (non-special + already-committed specials + support)
                    const specialCandidates = []; // 이번 라운드에 추가 commit 가능한 필살기 후보들

                    for (const [slot, id] of Object.entries(deck)) {
                        if (!id) continue;
                        if (slot === 'f1' && String(deck.c1) === String(id)) continue;

                        const data = window.details_kor[id];
                        const charName = getUnitMeta(id)?.name || `ID${id}`;
                        const inScope = isSlotAffected(slot, g.scope);
                        const includeSelfOnly = !isPartyWide && inScope;
                        const isSupportSlot = slot.startsWith('s');

                        if (isSupportSlot) {
                            const entries = getSupportEntries(data);
                            const supportIdx = parseInt(slot.slice(1)) - 1;
                            const pairedMainSlot = ['c1','m1','m2','m3','m4'][supportIdx];
                            const pairedMainAffected = isSlotAffected(pairedMainSlot, g.scope);
                            let baseRed = 0;
                            let supportScopeLabel = '';
                            for (const e of entries) {
                                const r = evaluateSupportContribution(e.effect, g.name, pairedMainAffected, isPartyWide);
                                if (r.turns > baseRed) { baseRed = r.turns; supportScopeLabel = r.label; }
                            }
                            if (baseRed > 0 && (!supportUsedTracker[id] || supportUsedTracker[id] === round)) {
                                supportUsedTracker[id] = round;
                                renderItems.push({ slot, id, charName, isSupportSlot: true, type: 'support', turns: baseRed, supportScopeLabel });
                            }
                        } else {
                            const role = (slot === 'c1' || slot === 'f1') ? 'captain' : 'member';
                            const suppressSpecial = g.name !== '필살기 턴 되돌리기' &&
                                                    isSlotRewound(slot) &&
                                                    !hasSelfRewindRecov(id);
                            const { sources } = evaluateCharReductionSources(data, g.name, role, { includeSelfOnly, suppressSpecial, round });
                            const nonSpecialSrcs = sources.filter(s => s.type !== '필살기');
                            const specialSrc = sources.find(s => s.type === '필살기');
                            const bestNonSpecial = nonSpecialSrcs.reduce((b, s) => s.turns > (b?.turns ?? 0) ? s : b, null);

                            // 비-필살기 contribution 즉시 렌더
                            if (bestNonSpecial && bestNonSpecial.turns > 0) {
                                renderItems.push({ slot, id, charName, isSupportSlot: false, type: bestNonSpecial.type, turns: bestNonSpecial.turns });
                                totalReduced += bestNonSpecial.turns;
                            }
                            // 필살기 처리: 같은 라운드에 이미 이 슬롯이 commit됐으면 추가 contribution
                            if (specialSrc && specialSrc.turns > 0 && specialUsedTracker[slot] === round) {
                                let typeLabel = '필살기';
                                if (_hasSpecialRefillEffect(id) && specialUsedCount[slot] === 2) typeLabel = '필살기(재충전)';
                                renderItems.push({ slot, id, charName, isSupportSlot: false, type: typeLabel, turns: specialSrc.turns });
                                totalReduced += specialSrc.turns;
                            } else if (specialSrc && specialSrc.turns > 0) {
                                // 이 슬롯이 아직 미commit, 후보로만 보관
                                const allowedUses = _hasSpecialRefillEffect(id) ? 2 : 1;
                                const used = specialUsedCount[slot] || 0;
                                if (used < allowedUses) {
                                    specialCandidates.push({ slot, id, charName, turns: specialSrc.turns });
                                }
                            }
                        }
                        if (renderItems.length > 0) {
                            // contribution 추가됨 (위에서 처리)
                        }
                    }
                    // 비-필살기 + 이미 commit된 필살기 + 서포트 contribution을 totalReduced에 추가 (서포트 부분)
                    for (const item of renderItems) {
                        if (item.isSupportSlot) totalReduced += item.turns;
                    }

                    // 2단계: 부족한 만큼만 새 필살기 commit (큰 기여 우선)
                    //   즉발 기믹(turn=0)은 최소 1턴 리덕션 필요 (대응 가능 표시용)
                    const commitTarget = Math.max(g.turn, 1);
                    if (!slotLockedImmune && totalReduced < commitTarget) {
                        specialCandidates.sort((a, b) => b.turns - a.turns);
                        for (const c of specialCandidates) {
                            if (totalReduced >= commitTarget) break;
                            // commit (슬롯 단위 추적)
                            specialUsedCount[c.slot] = (specialUsedCount[c.slot] || 0) + 1;
                            specialUsedTracker[c.slot] = round;
                            let typeLabel = '필살기';
                            if (_hasSpecialRefillEffect(c.id) && specialUsedCount[c.slot] === 2) typeLabel = '필살기(재충전)';
                            renderItems.push({ slot: c.slot, id: c.id, charName: c.charName, isSupportSlot: false, type: typeLabel, turns: c.turns });
                            totalReduced += c.turns;
                        }
                    }

                    // 3단계: renderItems → solvers 텍스트 (포맷팅)
                    for (const item of renderItems) {
                        const isBoost = boostChars.some(bc => String(bc.id) === String(item.id));
                        const turnTag = (!item.isSupportSlot && !isBoost) ? ' [턴작 필요]' : '';
                        let compatTag = '';
                        if (item.slot.startsWith('m') && !isMemberCompatibleWithCaptain(item.id, captainReqs)) {
                            compatTag = ' [속성/타입 미적용]';
                        }
                        const friendPrefix = (item.slot === 'f1') ? '(친구)' : '';
                        let label;
                        if (item.isSupportSlot) {
                            const note = (window.__supportFitNote || {})[item.id];
                            const mark = note === 'loose' ? '⚠️' : '';
                            const supportTypeText = item.supportScopeLabel ? `서포트:${item.supportScopeLabel}` : '서포트';
                            label = `${item.charName}${mark}[${supportTypeText}](${item.turns}턴)`;
                        } else {
                            label = `${friendPrefix}${item.charName}[${item.type}](${item.turns}턴)`;
                        }
                        solvers.push(`${label}${turnTag}${compatTag}`);
                    }
                    const isInstant = g.turn === 0;
                    const isSolved = !isInstant && totalReduced >= g.turn;
                    const scopeText = scopeLabel(g.scope);

                    let statusText, statusColor;
                    if (slotLockedImmune) {
                        statusText = '변환 불가 슬롯 + 고정으로 면역';
                        statusColor = '#00ffcc';
                    } else if (isInstant) {
                        // 즉발 기믹(슬롯 변환 등): 회복 턴 모델로 풀 수 없음 → 별도 대응 필요
                        statusText = solvers.length > 0 ? '즉발 (대응 가능)' : '즉발 (별도 대응 필요)';
                        statusColor = solvers.length > 0 ? '#00ffcc' : '#ffcc00';
                    } else if (isSolved) {
                        statusText = '해결 완료';
                        statusColor = '#00ffcc';
                    } else {
                        statusText = '부족: ' + (g.turn - totalReduced) + '턴';
                        statusColor = '#ff6b6b';
                    }
                    const solverText = solvers.length > 0 ? solvers.join(' + ') : (isInstant ? '-' : '조합 불가');
                    html += `<div class="solution-line"><span class="sol-label">● ${g.name} ${g.turn}턴 <span style="color:#888; font-size:11px;">${scopeText}</span> :</span> ${solverText} <span style="color:${statusColor}; font-weight:bold; margin-left:10px;">[${statusText}]</span></div>`;
                });
                html += `</div>`;
            }
            analysisArea.innerHTML = html;
        }

        function applyToDeck(deck) {
            ['f1', 'c1', 'm1', 'm2', 'm3', 'm4', 's1', 's2', 's3', 's4', 's5'].forEach(s => {
                const container = document.getElementById(`img-${s}`);
                if(!container) return;
                const id = deck[s];
                container.innerHTML = id ? `<img src="${generateImgSrc(id)}" title="ID: ${id} - ${getUnitMeta(id)?.name || ''}">` : '<span class="empty-text">EMPTY</span>';
            });

        function generateImgSrc(id) {
