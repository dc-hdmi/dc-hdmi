<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>OPTC 덱 구성 시뮬레이터</title>
    <script src="units.js?v=20260504"></script>
    <script src="details_kor.js?v=20260504"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Malgun Gothic', sans-serif; margin: 20px; }
        h2 { border-left: 5px solid #fff; padding-left: 15px; margin-bottom: 20px; font-size: 22px; }
        .container { border: 1px solid #fff; padding: 20px; margin-bottom: 30px; border-radius: 10px; }
        .round-grid-wrapper { overflow-x: auto; padding-bottom: 10px; }
        .round-grid { display: flex; gap: 20px; min-width: min-content; }
        .round-box { border: 1px solid #444; padding: 15px; background: #111; min-width: 350px; flex: 0 0 auto; }
        .gimmick-list { margin-top: 15px; display: flex; flex-direction: column; gap: 5px; min-height: 50px; }
        .gimmick-item { border-bottom: 1px dashed #444; padding: 4px 0; font-size: 14px; display: flex; justify-content: space-between; }
        .del-btn { color: #ff6b6b; cursor: pointer; font-weight: bold; }
        .round-ctrl-area { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .event-btn-group { display: flex; gap: 10px; }
        #btn-round-ctrl { background: #ffcc00; color: #000; padding: 8px 15px; border-radius: 5px; cursor: pointer; border:none; font-weight: bold; }
        .load-btn { background: #4a90e2; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; }
        .reset-btn { background: #6c757d; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; }
        #boost-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; min-height: 100px; border: 1px solid #333; padding: 10px; }
        .boost-rank-row { display: flex; align-items: flex-start; gap: 10px; }
        .boost-rank-label { min-width: 36px; font-weight: bold; font-size: 14px; padding: 6px 8px; border-radius: 4px; text-align: center; flex-shrink: 0; }
        .boost-rank-label.rank-A { background: gold; color: #000; }
        .boost-rank-label.rank-B { background: silver; color: #000; }
        .boost-rank-label.rank-C { background: #cd7f32; color: #000; }
        .boost-rank-label.rank-D { background: #6c757d; color: #fff; }
        .boost-rank-label.rank-E { background: #444; color: #fff; }
        .boost-rank-cards { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
        .boost-card { border: 1px solid #fff; padding: 5px; text-align: center; width: 80px; position: relative; cursor: pointer; transition: all 0.15s; }
        .boost-card:hover { border-color: #ff5252; background: rgba(255,82,82,0.15); }
        .boost-card:hover::after { content: '✕ 제외'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; background: rgba(255,82,82,0.85); padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; pointer-events: none; }
        .boost-card .rank-badge { position: absolute; top: 2px; left: 2px; background: gold; color: #000; font-weight: bold; padding: 0 4px; font-size: 10px; border-radius: 3px; }
        .boost-card.rank-B .rank-badge { background: silver; }
        .boost-card.rank-C .rank-badge { background: #cd7f32; }
        .boost-card.rank-D .rank-badge { background: #6c757d; color: #fff; }
        .boost-card.rank-E .rank-badge { background: #444; color: #fff; }
        .action-area { text-align: center; margin: 40px 0; }
        .build-btn { background: #00ffcc; color: #000; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 50px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
        .build-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        /* 캐릭터 이름 검색 모달 (우측 슬라이드 패널) — 좁고 1열 */
        #char-search-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 9996; cursor: pointer; }
        #char-search-mask.active { display: block; }
        #char-search-modal { position: fixed; top: 0; right: 0; bottom: 0; width: 200px; background: #111; border-left: 2px solid #00ffcc; box-shadow: -4px 0 20px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 9997; }
        #char-search-modal.active { display: flex; }
        .search-modal-header { padding: 10px 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 8px; }
        #char-search-title { color: #00ffcc; font-size: 12px; font-weight: bold; flex: 1; word-break: break-all; }
        .search-modal-close { background: #444; color: #fff; border: none; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; flex-shrink: 0; }
        .search-modal-list { flex: 1; overflow-y: auto; overscroll-behavior: contain; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .search-result-card { border: 1px solid #444; padding: 5px; text-align: center; cursor: pointer; background: #000; transition: all 0.15s; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
        .search-result-card:hover { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.3); }
        .search-result-card img { width: 50px; height: 50px; flex-shrink: 0; }
        .search-result-card .sr-info { flex: 1; text-align: left; min-width: 0; }
        .search-result-card .sr-id { font-size: 10px; color: #aaa; }
        .search-result-card .sr-name { font-size: 11px; color: #fff; word-break: break-all; }
        body.modal-open { overflow: hidden; }
        @media (max-width: 768px) {
            #char-search-modal { width: 60%; }
        }

        /* 전체 화면 마스킹 (UI 클릭 차단 + 덱 영역도 가림) */
        #loading-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; z-index: 9998; cursor: wait; }
        #loading-mask.active { display: block; }
        /* 상단 배너 — 마스킹 위 */
        #loading-overlay { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); border: 2px solid #00ffcc; box-shadow: 0 0 20px rgba(0,255,204,0.5); padding: 12px 24px; border-radius: 30px; display: none; align-items: center; z-index: 9999; flex-direction: row; gap: 15px; }
        #loading-overlay.active { display: flex; }
        .loading-spinner { width: 28px; height: 28px; border: 3px solid #333; border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #00ffcc; font-size: 14px; font-weight: bold; letter-spacing: 1px; line-height: 28px; white-space: nowrap; }
        /* swap 시 슬롯 강조 */
        .slot.searching .char-box { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.7); animation: searchPulse 0.8s ease-in-out infinite; }
        @keyframes searchPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .deck-layout { display: grid; grid-template-columns: repeat(2, 1fr); justify-content: center; gap: 15px; max-width: 500px; margin: 0 auto; background: #111; padding: 25px; border-radius: 20px; }
        .unit-group { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .slot { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .slot label { display: block; font-size: 10px; margin-bottom: 5px; color: #00ffcc; font-weight: bold; letter-spacing: 1px; }
        .char-box { width: 90px; height: 90px; border: 2px solid #fff; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .support-box { width: 60px; height: 60px; border: 2px dashed #555; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .empty-slot { width: 65px; height: 90px; } 

        .char-box img, .support-box img { width: 100%; height: 100%; object-fit: cover; }
        .empty-text { color: #444; font-size: 9px; }

        .solution-container { max-width: 900px; margin: 30px auto; padding: 20px; background: #0a0a0a; border-top: 2px solid #00ffcc; }
        .solution-round { margin-bottom: 15px; }
        .solution-round h3 { color: #00ffcc; font-size: 16px; margin-bottom: 8px; border-bottom: 1px solid #333; }
        .solution-line { font-size: 13px; margin: 4px 0; padding-left: 10px; border-left: 2px solid #444; }
        .sol-label { color: #ffcc00; font-weight: bold; }
        input, select { background: #000; color: #fff; border: 1px solid #fff; padding: 4px; }
        button { background: #fff; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }

        /* ===== 모바일 반응형 (태블릿 이하) ===== */
        @media (max-width: 768px) {
            body { margin: 10px; font-size: 15px; }
            h2 { font-size: 18px; padding-left: 10px; margin-bottom: 15px; }
            .container { padding: 12px; margin-bottom: 18px; border-radius: 8px; }

            /* 라운드 박스 — 가로 슬라이드 형태 유지, 한 슬라이드 = 한 화면 너비 */
            .round-grid { gap: 10px; }
            .round-box { min-width: calc(100vw - 40px); flex: 0 0 calc(100vw - 40px); padding: 10px; box-sizing: border-box; scroll-snap-align: start; }
            .round-grid-wrapper { scroll-snap-type: x mandatory; }
            .gimmick-item { font-size: 13px; }
            .round-box select { max-width: 100%; }

            /* 컨트롤 영역 — 2칸 grid (이벤트 버튼 그룹은 한 행 전체 차지) */
            .round-ctrl-area { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
            .round-ctrl-area > button { padding: 7px 4px; font-size: 12px; width: 100%; }
            /* 이벤트 패턴 버튼 4개 — 한 줄에 균등 배치 (전체 너비 차지) */
            .event-btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; width: 100%; grid-column: 1 / -1; }
            .event-btn-group button { width: 100%; padding: 8px 2px; font-size: 11px; }

            /* 패턴 설정 select/button — 한 줄에 안 맞으면 줄바꿈 */
            .round-box select, .round-box button { font-size: 13px; padding: 5px; }

            /* boost 카드 — 작게 표시 */
            #boost-list { padding: 8px; gap: 6px; }
            .boost-rank-row { gap: 8px; }
            .boost-rank-label { min-width: 28px; font-size: 12px; padding: 4px 6px; }
            .boost-rank-cards { gap: 6px; }
            .boost-card { width: 60px; padding: 3px; }
            .boost-card img { width: 50px !important; }
            .boost-card div { font-size: 9px !important; }
            .boost-card .rank-badge { font-size: 9px; padding: 0 3px; }

            /* 덱 결과 레이아웃 */
            .deck-layout { padding: 12px; gap: 10px; max-width: 100%; }
            .unit-group { gap: 6px; }
            .char-box { width: 65px; height: 65px; }
            .support-box { width: 45px; height: 45px; }
            .empty-slot { width: 50px; height: 65px; }
            .slot label { font-size: 9px; }

            /* 덱 구성 버튼 */
            .build-btn { padding: 12px 30px; font-size: 16px; }
            .action-area { margin: 25px 0; }

            /* 분석 결과 */
            .solution-container { padding: 12px; margin: 20px auto; }
            .solution-round h3 { font-size: 14px; }
            .solution-line { font-size: 12px; padding-left: 6px; }

            input, select { padding: 5px; font-size: 13px; }
            button { padding: 6px 10px; font-size: 13px; }
        }

        /* ===== 작은 모바일 (480px 이하) ===== */
        @media (max-width: 480px) {
            body { margin: 6px; font-size: 14px; }
            h2 { font-size: 16px; padding-left: 8px; }
            .container { padding: 8px; }

            .round-box { min-width: calc(100vw - 32px); flex: 0 0 calc(100vw - 32px); padding: 8px; box-sizing: border-box; }
            .round-grid { gap: 8px; }
            .gimmick-item { font-size: 12px; }

            /* 덱 결과 — 더 작게 */
            .char-box { width: 55px; height: 55px; }
            .support-box { width: 38px; height: 38px; }
            .empty-slot { width: 42px; height: 55px; }
            .deck-layout { padding: 8px; gap: 8px; }
            .unit-group { gap: 4px; }

            /* boost 카드 더 작게 */
            .boost-card { width: 52px; }
            .boost-card img { width: 44px !important; }

            .build-btn { padding: 10px 22px; font-size: 14px; }

            .solution-line { font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- 캐릭터 이름 검색 결과 모달 (우측 슬라이드 패널) -->
    <div id="char-search-mask" onclick="closeCharSearchModal()"></div>
    <div id="char-search-modal">
        <div class="search-modal-header">
            <span id="char-search-title">검색 결과</span>
            <button class="search-modal-close" onclick="closeCharSearchModal()">✕</button>
        </div>
        <div class="search-modal-list" id="char-search-results"></div>
    </div>

    <div id="loading-mask"></div>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">덱 구성 중...</div>
    </div>

    <div class="container">
        <h2>⚔️ 패턴 설정</h2>
        <div class="round-ctrl-area">
            <div class="event-btn-group">
                <button class="load-btn" id="btn-load-궤적" onclick="loadEventGimmicks('궤적')">궤적 패턴 📂</button>
                <button class="load-btn" id="btn-load-트맵[보스]" onclick="loadEventGimmicks('트맵[보스]')">트맵[보스] 패턴 📂</button>
                <button class="load-btn" id="btn-load-트맵[난입]" onclick="loadEventGimmicks('트맵[난입]')">트맵[난입] 패턴 📂</button>
                <button class="load-btn" id="btn-load-유대" onclick="loadEventGimmicks('유대')">유대 패턴 📂</button>
            </div>
            <button class="reset-btn" onclick="resetGimmicks()">패턴 초기화 🔄</button>
            <button id="btn-round-ctrl" onclick="toggleRound()">배틀 라운드 추가 +</button>
        </div>
        <div class="round-grid-wrapper">
            <div id="round-container" class="round-grid"></div>
        </div>
    </div>

    <div class="container">
        <h2>⭐ 특별효과 케릭 목록</h2>
        <div style="margin-bottom: 10px;">
            <button class="load-btn" id="btn-load-boost" style="margin-right: 15px; background: #28a745;" onclick="loadBoostCharacters()">특별효과 불러오기 📋</button>
            <select id="boost-rank-select">
                <option value="A">A 등급</option>
                <option value="B">B 등급</option>
                <option value="C">C 등급</option>
                <option value="D">D 등급</option>
                <option value="E">E 등급</option>
            </select>
            <input type="text" id="boost-id-input" placeholder="캐릭터 이름 입력" onkeydown="if(event.key==='Enter') searchBoostChar()">
            <button onclick="searchBoostChar()">검색</button>
        </div>
        <div id="boost-list"></div>
    </div>

    <div class="container">
        <h2>🤝 친구선장</h2>
        <div style="margin-bottom: 10px;">
            <input type="text" id="friend-captain-input" placeholder="캐릭터 이름 입력" onkeydown="if(event.key==='Enter') searchFriendCaptain()">
            <button onclick="searchFriendCaptain()">검색</button>
            <span style="margin-left: 10px; color: #ff5252; font-size: 13px; font-weight: bold;">⚠ 친구선장을 선택하세요 (필수)</span>
        </div>
        <div id="friend-captain-display" style="min-height: 100px; padding: 10px; border: 1px solid #333; display: flex; align-items: center; gap: 10px;"></div>
    </div>

    <div class="container">
        <h2>👤 필수 포함 케릭</h2>
        <div style="margin-bottom: 10px;">
            <input type="text" id="pref-id-input" placeholder="캐릭터 이름 입력" onkeydown="if(event.key==='Enter') searchPreferred()">
            <button onclick="searchPreferred()">검색</button>
            <span style="margin-left: 10px; color: #888; font-size: 12px;">무조건 덱에 포함됩니다</span>
        </div>
        <div id="pref-list" style="display: flex; flex-wrap: wrap; gap: 10px; min-height: 80px; border: 1px solid #333; padding: 10px;"></div>
    </div>

    <div class="action-area">
        <button class="build-btn" id="build-btn" onclick="runAutoBuildDeck()">덱 구성 찾기 🔍</button>
    </div>

    <div class="container" style="border:none;">
        <h2 style="border-left: 5px solid #fff;">🚢 덱 구성 결과</h2>
        <div class="deck-layout" id="deck-display"></div>
        <div id="deck-analysis" class="solution-container" style="display:none;"></div>
    </div>

    <script>
        let activeGimmicks = { 2: [], 3: [], 4: [], 5: [] };
        let boostChars = [];
        let preferredChars = []; // 사용자 지정 필수 포함 캐릭 ID 목록 (string[])
        let friendCaptainId = null; // 사용자 지정 친구선장 ID (null이면 자기 선장과 동일)
        let currentMaxRound = 3;

        // ===== 이벤트 로테이션 설정 =====
        // 매달 궤적/트맵[보스]/트맵[난입]/유대 4개가 로테이션으로 열린다.
        // 이번 달 활성 이벤트를 아래에서 선택 (UI에서 활성 이벤트 버튼이 강조 표시됨)
        // 값: '궤적' | '트맵[보스]' | '트맵[난입]' | '유대'
        const ACTIVE_EVENT = '궤적';

        // 이벤트별 기믹 패턴 (활성 이벤트만 데이터 보유, 나머지는 빈 패턴)
        const eventGimmicksData = {
            '궤적': `{"battleInfo": {"3": [{"name": "[폭탄]슬롯 변환", "turn": 0}, {"name": "공격력 감소", "turn": 7}, {"name": "선장효과 무효", "turn": 8}, {"name": "슬롯 고정", "turn": 1}],"4": [{"name": "일정이상 데미지 감소(격감)", "turn": 7}, {"name": "남은 체력 1로 버티기", "turn": 7}],"5": [{"name": "선장효과 무효", "turn": 10}, {"name": "방어력 상승", "turn": 6}, {"name": "방어력 감소 무효", "turn": 98}, {"name": "[독]슬롯 변환", "turn": 0}, {"name": "[방해]슬롯 변환", "turn": 0}, {"name": "[마비]슬롯 변환", "turn": 0}, {"name": "필살기 봉쇄", "turn": 7}, {"name": "봉쇄", "turn": 9, "scope": {"row": ["middle","bottom"], "col": "left"}}, {"name": "필살기 턴 되돌리기", "turn": 2, "scope": {"row": ["middle","bottom"], "col": "right"}}]}}`,
            '트맵[보스]': `{"battleInfo": {}}`,
            '트맵[난입]': `{"battleInfo": {}}`,
            '유대': `{"battleInfo": {}}`
        };
        // 이벤트별 특별효과 캐릭 목록
        // 활성 이벤트 패턴을 불러오면 해당 이벤트의 boost 목록이 사용됨
        // (다음 달 트맵/유대 이벤트 시 아래 빈 배열에 캐릭터 ID 채우면 됨)
        const eventBoostData = {
            '궤적': {
                "A": ["4550", "4551"],
                "B": ["4552", "4553"],
                "C": ["4549", "4541", "4536", "4537", "4538", "4539", "4521", "4522", "4523", "4524", "4525", "4535", "4540", "4529", "4530", "4531", "4520"],
                "D": ["4513", "4514", "4526", "4527"],
                "E": ["4511", "4497", "4481", "4464", "4448", "4430", "4414", "4399", "4385", "4358", "4342", "4327", "4312", "4298", "4280", "4261", "4246", "4225", "4206", "4191", "4177", "4147", "4128", "4108", "4089", "4074", "4053", "4033", "3886"]
            },
            '트맵[보스]': {
                "A": [], "B": [], "C": [], "D": [], "E": []
            },
            '트맵[난입]': {
                "A": [], "B": [], "C": [], "D": [], "E": []
            },
            '유대': {
                "A": [], "B": [], "C": [], "D": [], "E": []
            }
        };

        // 현재 선택된 이벤트 (패턴 불러오기 버튼 클릭 시 갱신, 기본값은 ACTIVE_EVENT)
        let currentEventType = ACTIVE_EVENT;
        // 사용자가 패턴 버튼을 한 번이라도 클릭했는지 추적 (특별효과 불러오기 가드용)
        let userPickedEvent = false;

        // 해당 이벤트의 패턴이 비어있는지 (배틀 정보 없음)
        function _isEventEmpty(eventType) {
            try {
                const data = JSON.parse(eventGimmicksData[eventType] || '{}');
                const info = data.battleInfo || {};
                return Object.keys(info).length === 0;
            } catch (e) { return true; }
        }
        const patterns = ["선장효과 무효", "데미지 감소", "데미지 격감", "방어력 상승", "방어력 감소 무효", "화상", "마비", "공격력 감소", "필살기 봉쇄", "봉쇄", "위압", "필살기 턴 되돌리기", "데미지 무효", "일정이상 데미지 감소(격감)", "기절", "[방해]슬롯 변환", "[폭탄]슬롯 변환", "[고기]슬롯 변환", "[불리]슬롯 변환", "[공백]슬롯 변환", "[독]슬롯 변환", "[마비]슬롯 변환", "슬롯 고정", "필살기 턴 고정", "선장효과", "날려버리기", "의성어 은폐", "베리어", "남은 체력 1로 버티기", "특정 슬롯 사용 시 공격력 감소", "독"];

        // 기믹 별칭: UI에 표시되는 이름 → 캐릭터 텍스트에서 검색할 정식 표현
        // 값은 (1) 문자열 (substring + 턴 수 추출) 또는
        //      (2) {regex, turns} 객체 (정규식 매칭 시 고정 턴 수 반환) 또는
        //      (3) 위 두 종류를 섞은 배열 (각각 시도해서 최댓값 사용)
        // 적이 슬롯을 변환하는 모든 이벤트에 반응하는 generic 트리거 (예: 4117 바오황)
        // 이걸 모든 슬롯 변환 기믹에 추가해, 그런 서포트가 가장 빠른 슬롯 변환 라운드에서 소비되도록 함
        const GENERIC_SLOT_CONV_TRIGGER = { regex: /적[이의]?\s*슬롯[을의]?\s*변환/, turns: 1 };

        const GIMMICK_ALIASES = {
            // [독]/[마비]슬롯 변환은 해당 상태 회복 효과로 해결되므로
            // 단순 키워드가 아니라 "독 ... 회복/줄" 패턴이 있어야만 매칭 (false positive 방지)
            "[독]슬롯 변환": [
                { regex: /독[^"\.\!\?]{0,30}(?:상태[를을]?[^"\.\!\?]{0,15})?(회복|줄)/, turns: 1 },
                GENERIC_SLOT_CONV_TRIGGER
            ],
            "[마비]슬롯 변환": [
                { regex: /마비[^"\.\!\?]{0,30}(?:상태[를을]?[^"\.\!\?]{0,15})?(회복|줄)/, turns: 1 },
                GENERIC_SLOT_CONV_TRIGGER
            ],
            // 슬롯 변환 기믹: 한글/영문 슬롯 표기 + generic 슬롯 변환 트리거
            "[방해]슬롯 변환": ["[방해]", "[BLOCK]", GENERIC_SLOT_CONV_TRIGGER],
            "[폭탄]슬롯 변환": ["[폭탄]", "[BOMB]", GENERIC_SLOT_CONV_TRIGGER],
            "[고기]슬롯 변환": ["[고기]", "[MEAT]", GENERIC_SLOT_CONV_TRIGGER],
            "[공백]슬롯 변환": ["[공백]", "[EMPTY]", GENERIC_SLOT_CONV_TRIGGER],
            "[불리]슬롯 변환": ["[불리]", GENERIC_SLOT_CONV_TRIGGER],
            "일정이상 데미지 감소(격감)": "데미지 격감",
            "남은 체력 1로 버티기": [
                "남은 체력 1로 버티는 효과",
                // 턴 종료 시 추가 데미지 — 매 턴 발동되어 endure를 즉시 격파 → 99턴 처리
                { regex: /턴 종료 시[^"\.]{0,60}공격력[^"\.]{0,40}추가 데미지/, turns: 99 }
            ]
        };

        function initRounds() {
            const container = document.getElementById('round-container');
            container.innerHTML = '';
            for(let i=2; i <= currentMaxRound; i++) addRoundUI(i);
            updateRoundBtn();
        }

        function addRoundUI(i) {
            const container = document.getElementById('round-container');
            let turnOptions = `<option value="0">없음</option>`;
            for(let t=1; t<=20; t++) turnOptions += `<option value="${t}">${t}턴</option>`;
            const rowOptions = `<option value="all">전체 행</option><option value="top">상단</option><option value="middle">중단</option><option value="bottom">하단</option>`;
            const colOptions = `<option value="all">전체 열</option><option value="left">좌측</option><option value="right">우측</option>`;
            const box = document.createElement('div');
            box.className = 'round-box';
            box.id = `round-box-${i}`;
            box.innerHTML = `<strong>BATTLE ${i} 패턴</strong><br><br>
                <select id="sel-${i}">${patterns.map(p => `<option value="${p}">${p}</option>`).join('')}</select>
                <select id="turn-${i}">${turnOptions}</select>
                <select id="row-${i}">${rowOptions}</select>
                <select id="col-${i}">${colOptions}</select>
                <button onclick="addGimmick(${i})">기믹 추가</button>
                <div id="list-${i}" class="gimmick-list"></div>`;
            container.appendChild(box);
            renderGimmicks(i);
        }

        function resetGimmicks() {
            if(!confirm("모든 라운드의 기믹 설정을 초기화하시겠습니까?")) return;
            activeGimmicks = { 2: [], 3: [], 4: [], 5: [] };
            currentMaxRound = 3;
            initRounds();
        }

        function loadEventGimmicks(eventType) {
            const raw = eventGimmicksData[eventType];
            if (!raw) { alert(`${eventType} 패턴 데이터가 없습니다.`); return; }
            if (_isEventEmpty(eventType)) {
                alert(`${eventType} 이벤트는 아직 패턴이 등록되지 않았습니다.`);
                return;
            }
            // 선택된 이벤트 갱신 (특별효과 불러오기에서 같이 사용)
            currentEventType = eventType;
            userPickedEvent = true;
            _updateBoostBtnLabel();
            _highlightActiveEventButton();
            try {
                const data = JSON.parse(raw);
                const info = data.battleInfo || {};
                const roundsInJson = Object.keys(info).map(Number);
                if (roundsInJson.length === 0) {
                    // 빈 패턴 — 초기화만 수행
                    activeGimmicks = { 2: [], 3: [], 4: [], 5: [] };
                    currentMaxRound = 3;
                    initRounds();
                    alert(`${eventType} 패턴은 아직 등록되지 않았습니다. (빈 패턴 로드)`);
                    return;
                }
                currentMaxRound = Math.min(Math.max(Math.max(...roundsInJson), 3), 5);
                activeGimmicks = { 2: [], 3: [], 4: [], 5: [] };
                for(let r in info) {
                    if(activeGimmicks[r]) {
                        // scope 필드 폴백: 누락 시 전체로 처리
                        activeGimmicks[r] = info[r].map(g => ({
                            ...g,
                            scope: g.scope || { row: 'all', col: 'all' }
                        }));
                    }
                }
                initRounds();
            } catch (e) { alert("패턴 데이터를 불러오는 중 오류가 발생했습니다."); }
        }

        function _updateBoostBtnLabel() {
            const btn = document.getElementById('btn-load-boost');
            if (btn) btn.textContent = `특별효과 불러오기 📋 (${currentEventType})`;
        }

        // 이벤트 버튼 상태 갱신 (페이지 로드 + 패턴 클릭 시 호출)
        //   - 빈 이벤트: 회색 비활성화
        //   - 활성 이벤트(ACTIVE_EVENT): ⭐ 강조
        //   - 사용자가 클릭한 이벤트: 파란 외곽선
        function _highlightActiveEventButton() {
            ['궤적', '트맵[보스]', '트맵[난입]', '유대'].forEach(ev => {
                const btn = document.getElementById(`btn-load-${ev}`);
                if (!btn) return;
                const isEmpty = _isEventEmpty(ev);
                const isActive = (ev === ACTIVE_EVENT);
                const isPicked = userPickedEvent && (ev === currentEventType);

                // 텍스트 라벨
                let label = `${ev} 패턴`;
                if (isActive) label += ' ⭐';
                if (isEmpty) label += ' (준비중)';
                btn.textContent = label;

                if (isEmpty) {
                    // 패턴 없음: 비활성화
                    btn.disabled = true;
                    btn.style.opacity = '0.4';
                    btn.style.cursor = 'not-allowed';
                    btn.style.background = '#555';
                    btn.style.outline = '';
                    btn.style.fontWeight = '';
                    btn.title = '패턴이 아직 등록되지 않았습니다';
                } else {
                    btn.disabled = false;
                    btn.style.opacity = '';
                    btn.style.cursor = '';
                    btn.style.background = '';
                    if (isPicked) {
                        // 사용자가 선택한 이벤트: 파란 외곽선
                        btn.style.outline = '3px solid #4dd0e1';
                        btn.style.fontWeight = 'bold';
                        btn.title = '현재 선택된 이벤트';
                    } else if (isActive) {
                        // 활성 이벤트(소스 설정): 노란 외곽선
                        btn.style.outline = '2px solid #ffd54f';
                        btn.style.fontWeight = 'bold';
                        btn.title = '이번 달 활성 이벤트';
                    } else {
                        btn.style.outline = '';
                        btn.style.fontWeight = '';
                        btn.title = '';
                    }
                }
            });
        }

        function toggleRound() {
            if (currentMaxRound < 5) { currentMaxRound++; addRoundUI(currentMaxRound); } 
            else { while(currentMaxRound > 3) { document.getElementById(`round-box-${currentMaxRound}`)?.remove(); activeGimmicks[currentMaxRound] = []; currentMaxRound--; } }
            updateRoundBtn();
        }

        function updateRoundBtn() {
            const btn = document.getElementById('btn-round-ctrl');
            btn.innerText = currentMaxRound >= 5 ? "배틀 라운드 삭제 -" : "배틀 라운드 추가 +";
            btn.style.background = currentMaxRound >= 5 ? "#ff6b6b" : "#ffcc00";
        }

        function addGimmick(round) {
            const name = document.getElementById(`sel-${round}`).value;
            const turn = parseInt(document.getElementById(`turn-${round}`).value);
            const row = document.getElementById(`row-${round}`)?.value || 'all';
            const col = document.getElementById(`col-${round}`)?.value || 'all';
            activeGimmicks[round].push({ name, turn, scope: { row, col } });
            renderGimmicks(round);
        }

        // scope 객체를 사람이 읽을 수 있는 라벨로
        function scopeLabel(scope) {
            if (!scope) return '[전체]';
            const r = scope.row || 'all';
            const c = scope.col || 'all';
            if (r === 'all' && c === 'all') return '[전체]';
            const ROW = { top: '상단', middle: '중단', bottom: '하단' };
            const COL = { left: '좌측', right: '우측' };
            const fmt = (v, map) => {
                if (v === 'all') return '';
                if (Array.isArray(v)) return v.map(x => map[x] || '').filter(x => x).join('/');
                return map[v] || '';
            };
            const parts = [];
            const rText = fmt(r, ROW);
            const cText = fmt(c, COL);
            if (rText) parts.push(rText);
            if (cText) parts.push(cText);
            return `[${parts.join(' ')}]`;
        }

        function renderGimmicks(round) {
            const target = document.getElementById(`list-${round}`);
            if(!target) return;
            target.innerHTML = activeGimmicks[round].map((g, idx) => {
                const turnText = g.turn > 0 ? ':' + g.turn : '';
                const scopeText = scopeLabel(g.scope);
                return `<div class="gimmick-item">${g.name}${turnText} <span style="color:#888; font-size:11px;">${scopeText}</span> <span class="del-btn" onclick="removeGimmick(${round}, ${idx})">X</span></div>`;
            }).join('');
        }

        function removeGimmick(round, index) { activeGimmicks[round].splice(index, 1); renderGimmicks(round); }

        function loadBoostCharacters() {
            // 가드: 사용자가 패턴 버튼을 한 번도 클릭하지 않았으면 안내 (이건 유지 — 동작 흐름 보장 필요)
            if (!userPickedEvent) {
                alert('먼저 어떤 이벤트의 패턴인지 선택해주세요.\n(궤적 / 트맵 / 유대 패턴 버튼 중 하나를 클릭)');
                return;
            }
            const boostData = eventBoostData[currentEventType];
            if (!boostData) return;
            for (const rank in boostData) {
                boostData[rank].forEach(id => {
                    if (!boostChars.some(c => c.id === id)) boostChars.push({ id, rank });
                });
            }
            renderBoostList();
        }

        // ===== 캐릭터 이름 검색 모달 =====
        let _currentSearchOnSelect = null;
        function openCharSearchModal(query, onSelect) {
            const modal = document.getElementById('char-search-modal');
            const list = document.getElementById('char-search-results');
            const title = document.getElementById('char-search-title');
            if (!modal) return;
            if (!query) { alert('캐릭터 이름을 입력하세요.'); return; }
            _currentSearchOnSelect = onSelect;
            // 검색: units에서 이름 부분 일치 (대소문자 무시), sub-character ID(예: "4551-1") 제외
            const matches = [];
            const q = query.toLowerCase();
            for (const id in window.units) {
                if (id.includes('-')) continue; // sub-character 제외
                const u = window.units[id];
                if (u?.name && u.name.toLowerCase().includes(q)) {
                    matches.push({ id, name: u.name });
                }
            }
            // ID 내림차순 (신규 캐릭 위)
            matches.sort((a, b) => (parseInt(b.id) || 0) - (parseInt(a.id) || 0));
            title.textContent = `"${query}" 검색 결과 (${matches.length}명)`;
            if (matches.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">검색 결과 없음</div>';
            } else {
                list.innerHTML = matches.map(m => `
                    <div class="search-result-card" onclick="selectSearchResult('${m.id}')">
                        <img src="${generateImgSrc(m.id)}" onerror="this.style.opacity=0.3">
                        <div class="sr-info">
                            <div class="sr-id">${m.id}</div>
                            <div class="sr-name">${m.name}</div>
                        </div>
                    </div>
                `).join('');
            }
            const mask = document.getElementById('char-search-mask');
            if (mask) mask.classList.add('active');
            modal.classList.add('active');
            document.body.classList.add('modal-open'); // 메인 화면 스크롤 잠금
        }
        function closeCharSearchModal() {
            const modal = document.getElementById('char-search-modal');
            const mask = document.getElementById('char-search-mask');
            if (modal) modal.classList.remove('active');
            if (mask) mask.classList.remove('active');
            document.body.classList.remove('modal-open');
            _currentSearchOnSelect = null;
        }
        function selectSearchResult(id) {
            if (_currentSearchOnSelect) _currentSearchOnSelect(id);
            closeCharSearchModal();
        }

        // ===== 각 입력 필드용 검색 진입 함수 =====
        function searchBoostChar() {
            const query = document.getElementById('boost-id-input').value.trim();
            const rank = document.getElementById('boost-rank-select').value;
            openCharSearchModal(query, (id) => {
                if (!boostChars.some(c => c.id === id)) {
                    boostChars.push({ id, rank });
                    renderBoostList();
                }
                document.getElementById('boost-id-input').value = '';
            });
        }
        function searchFriendCaptain() {
            const query = document.getElementById('friend-captain-input').value.trim();
            openCharSearchModal(query, (id) => {
                friendCaptainId = id;
                document.getElementById('friend-captain-input').value = '';
                renderFriendCaptain();
            });
        }
        function searchPreferred() {
            const query = document.getElementById('pref-id-input').value.trim();
            openCharSearchModal(query, (id) => {
                if (!preferredChars.includes(id)) {
                    preferredChars.push(id);
                    renderPreferredList();
                }
                document.getElementById('pref-id-input').value = '';
            });
        }

        function addBoost() {
            const id = document.getElementById('boost-id-input').value;
            const rank = document.getElementById('boost-rank-select').value;
            if(!id || boostChars.some(c => c.id === id)) return;
            boostChars.push({ id, rank });
            renderBoostList();
            document.getElementById('boost-id-input').value = '';
        }

        function renderBoostList() {
            const list = document.getElementById('boost-list');
            // 등급별 그룹화 (A, B, C, D, E 순서 고정)
            const rankOrder = ['A', 'B', 'C', 'D', 'E'];
            const grouped = {};
            for (const r of rankOrder) grouped[r] = [];
            boostChars.forEach(c => {
                if (grouped[c.rank]) grouped[c.rank].push(c);
                else (grouped[c.rank] = [c]);
            });
            const rows = rankOrder
                .filter(r => grouped[r] && grouped[r].length > 0)
                .map(r => {
                    const cards = grouped[r].map(char =>
                        `<div class="boost-card rank-${char.rank}" onclick="removeBoost('${char.id}')" title="클릭하여 제외">
                            <span class="rank-badge">${char.rank}</span>
                            <img src="${generateImgSrc(char.id)}" style="width:70px;">
                            <div style="font-size:10px;">${char.id}</div>
                        </div>`
                    ).join('');
                    return `<div class="boost-rank-row">
                        <div class="boost-rank-label rank-${r}">${r}</div>
                        <div class="boost-rank-cards">${cards}</div>
                    </div>`;
                }).join('');
            list.innerHTML = rows;
        }
        
        function removeBoost(id) { boostChars = boostChars.filter(c => c.id !== id); renderBoostList(); }

        function addPreferred() {
            const input = document.getElementById('pref-id-input');
            const id = String(input.value || '').trim();
            if (!id) return;
            if (preferredChars.includes(id)) { alert('이미 추가된 캐릭터입니다.'); return; }
            if (!window.details_kor || !window.details_kor[id]) {
                if (!confirm(`ID ${id} 데이터가 없습니다. 그래도 추가하시겠습니까?`)) return;
            }
            preferredChars.push(id);
            renderPreferredList();
            input.value = '';
        }

        function removePreferred(id) {
            preferredChars = preferredChars.filter(p => p !== id);
            renderPreferredList();
        }

        function renderPreferredList() {
            const list = document.getElementById('pref-list');
            if (!list) return;
            list.innerHTML = preferredChars.map(id => {
                const name = (window.units && window.units[id]?.name) || '';
                return `<div class="boost-card" style="border-color:#00ffcc;">
                    <span class="remove-x" onclick="removePreferred('${id}')">x</span>
                    <img src="${generateImgSrc(id)}" style="width:70px;">
                    <div style="font-size:10px;">${id}</div>
                    <div style="font-size:9px; color:#aaa;">${name}</div>
                </div>`;
            }).join('');
        }

        function setFriendCaptain() {
            const input = document.getElementById('friend-captain-input');
            const id = String(input.value || '').trim();
            if (!id) return;
            if (!window.details_kor || !window.details_kor[id]) {
                if (!confirm(`ID ${id} 데이터가 없습니다. 그래도 설정하시겠습니까?`)) return;
            }
            friendCaptainId = id;
            renderFriendCaptain();
            input.value = '';
        }

        function clearFriendCaptain() {
            friendCaptainId = null;
            renderFriendCaptain();
        }

        function renderFriendCaptain() {
            const display = document.getElementById('friend-captain-display');
            if (!display) return;
            if (!friendCaptainId) {
                display.innerHTML = '';
                return;
            }
            const name = (window.units && window.units[friendCaptainId]?.name) || '';
            display.innerHTML = `<div class="boost-card" style="border-color:#ffaa00;">
                <span class="remove-x" onclick="clearFriendCaptain()">x</span>
                <img src="${generateImgSrc(friendCaptainId)}" style="width:70px;">
                <div style="font-size:10px;">${friendCaptainId}</div>
                <div style="font-size:9px; color:#aaa;">${name}</div>
            </div>`;
        }

        // units.js 메타데이터 매핑 (영문 type/class → 한글)
        const TYPE_KOR = { STR: '힘', DEX: '기', QCK: '속', PSY: '심', INT: '지' };
        const CLASS_KOR = {
            'Slasher': '참격형', 'Striker': '타격형', 'Shooter': '사격형',
            'Fighter': '격투형', 'Powerhouse': '강인형', 'Free Spirit': '자유형',
            'Cerebral': '박식형', 'Driven': '야심형'
        };

        function getUnitMeta(id) { return (window.units && window.units[id]) || null; }

        // 덱 슬롯의 행/열 좌표 (기믹 영향 범위 판정용)
        //   실제 화면 렌더링 기준:
        //     좌측 컬럼: f1(FRIEND), m1, m3
        //     우측 컬럼: c1(CAPTAIN), m2, m4
        //   서포트 슬롯은 짝지어진 메인 슬롯의 좌표를 그대로 따름 (s1↔c1, s2↔m1, ...)
        const SLOT_POSITIONS = {
            f1: { row: 'top',    col: 'left'  },
            c1: { row: 'top',    col: 'right' },
            m1: { row: 'middle', col: 'left'  },
            m2: { row: 'middle', col: 'right' },
            m3: { row: 'bottom', col: 'left'  },
            m4: { row: 'bottom', col: 'right' },
            s1: { row: 'top',    col: 'right' }, // pair: c1
            s2: { row: 'middle', col: 'left'  }, // pair: m1
            s3: { row: 'middle', col: 'right' }, // pair: m2
            s4: { row: 'bottom', col: 'left'  }, // pair: m3
            s5: { row: 'bottom', col: 'right' }  // pair: m4
        };

        // 기믹의 scope { row, col } 가 슬롯에 적용되는지 판정
        //   row/col은 'all' | 단일값 | 배열(여러 값 OR) 모두 지원
        //   예: row: ['middle', 'bottom'] = 중단 또는 하단
        function _scopeMatches(value, target) {
            if (value === 'all') return true;
            if (Array.isArray(value)) return value.includes(target);
            return value === target;
        }
        function isSlotAffected(slot, scope) {
            if (!scope) return true;
            const r = scope.row || 'all';
            const c = scope.col || 'all';
            if (r === 'all' && c === 'all') return true;
            const pos = SLOT_POSITIONS[slot];
            if (!pos) return true;
            return _scopeMatches(r, pos.row) && _scopeMatches(c, pos.col);
        }

        // 슬롯/오브 이름들 — 태그 추출 시 제외
        const ORB_BRACKET_NAMES = new Set([
            'STR','DEX','QCK','PSY','INT','TND','RCV','BLOCK','BOMB','MEAT','EMPTY','RAINBOW','WANO','G',
            '힘','기','속','심','지','유리','불리','공백','회','연','폭탄','고기','독','마비','방해'
        ]);

        // 텍스트에서 [XXX] 형태의 태그 추출 (슬롯/오브 이름 제외)
        function extractTagsFromText(text) {
            if (!text) return [];
            const str = typeof text === 'object' ? JSON.stringify(text) : String(text);
            const tags = new Set();
            const regex = /\[([^\]]+)\]/g;
            let m;
            while ((m = regex.exec(str)) !== null) {
                const t = m[1].trim();
                if (t && !ORB_BRACKET_NAMES.has(t)) tags.add(t);
            }
            return Array.from(tags);
        }

        // 메인 캐릭터의 매칭 키워드 추출: 이름 + "X 속성" + 한글 클래스명 + 태그(captain/lLimit/special에 등장)
        function getMainKeywords(id) {
            const u = getUnitMeta(id);
            if (!u) return { name: '', tokens: [] };
            const tokens = [];
            if (u.name) tokens.push(u.name);
            if (u.type && TYPE_KOR[u.type]) tokens.push(TYPE_KOR[u.type] + ' 속성');
            const classes = Array.isArray(u.class) ? u.class : (u.class ? [u.class] : []);
            for (const c of classes) if (CLASS_KOR[c]) tokens.push(CLASS_KOR[c]);

            // 태그 추출: captain/lLimit/special 텍스트의 [XXX] (슬롯명 제외)
            const data = window.details_kor[id];
            if (data) {
                const tagSet = new Set();
                for (const src of [data.captain, data.lLimit, data.special]) {
                    extractTagsFromText(src).forEach(t => tagSet.add(t));
                }
                for (const t of tagSet) {
                    tokens.push(`[${t}]`);
                    tokens.push(t); // 괄호 없는 형태도 포함 (서포트 target이 둘 중 어느 형식이든 매칭)
                }
            }
            return { name: u.name || '', tokens };
        }

        // 서포트 데이터 정규화: support는 [{Characters, description: [Lv1..Lv5]}] 배열
        function getSupportEntries(sData) {
            if (!sData || !Array.isArray(sData.support)) return [];
            return sData.support.map(s => {
                if (!s) return null;
                const desc = Array.isArray(s.description)
                    ? s.description[s.description.length - 1]
                    : String(s.description || "");
                return { effect: desc, target: s.Characters || "" };
            }).filter(x => x && x.effect);
        }

        // captain 텍스트에서 요구되는 type/class 키워드 추출
        // 반환: { types: Set<영문>, classes: Set<영문>, unrestricted: boolean }
        // 단일 텍스트에서 captain 요구사항 추출
        //   - "일당의 공격력" 같은 전체 적용 → unrestricted
        //   - 문장 단위로 가장 큰 공격 배수의 type/class만 (부수 1.1배 효과 무시)
        function _extractReqsSingleText(text) {
            const empty = { types: new Set(), classes: new Set(), unrestricted: true };
            if (!text) return empty;
            const t = String(text);
            if (/일당의 공격력|모든 캐릭터의 공격력/.test(t)) return empty;

            const sentences = t.split(/다\.\s*/).filter(s => s.trim());
            let maxMult = 0;
            let bestTypes = new Set();
            let bestClasses = new Set();
            for (const sent of sentences) {
                const multMatches = sent.match(/공격력(?:을|이)?[^.]*?(?:약\s*)?([\d.]+)\s*배/g);
                if (!multMatches) continue;
                let sentMaxMult = 0;
                for (const m of multMatches) {
                    const num = m.match(/([\d.]+)\s*배/);
                    if (num) {
                        const v = parseFloat(num[1]);
                        if (v > sentMaxMult) sentMaxMult = v;
                    }
                }
                if (sentMaxMult <= maxMult) continue;
                const sentTypes = new Set();
                const sentClasses = new Set();
                for (const [eng, kor] of Object.entries(TYPE_KOR)) {
                    if (sent.includes(`${kor} 속성`)) sentTypes.add(eng);
                }
                for (const [eng, kor] of Object.entries(CLASS_KOR)) {
                    if (sent.includes(kor)) sentClasses.add(eng);
                }
                if (sentTypes.size === 0 && sentClasses.size === 0) continue;
                maxMult = sentMaxMult;
                bestTypes = sentTypes;
                bestClasses = sentClasses;
            }
            if (bestTypes.size === 0 && bestClasses.size === 0) return empty;
            return { types: bestTypes, classes: bestClasses, unrestricted: false };
        }

        // 캡틴 요구사항 추출 (듀얼 캐릭은 각 variant 별로 추출 후 UNION)
        //   - 듀얼: character1/character2/combined가 서로 다른 type/class 요구할 수 있음
        //     예: character1=STR/INT, character2=PSY/QCK → 둘 다 호환 가능 캐릭으로 간주
        //   - 어느 variant라도 unrestricted면 전체 unrestricted
        function extractCaptainRequirements(captainText) {
            const empty = { types: new Set(), classes: new Set(), unrestricted: true };
            if (!captainText) return empty;

            if (typeof captainText === 'object') {
                const allTypes = new Set();
                const allClasses = new Set();
                let foundAny = false;
                for (const variant of Object.values(captainText)) {
                    const reqs = _extractReqsSingleText(variant);
                    if (reqs.unrestricted) {
                        return { types: new Set(), classes: new Set(), unrestricted: true };
                    }
                    for (const t of reqs.types) allTypes.add(t);
                    for (const c of reqs.classes) allClasses.add(c);
                    if (reqs.types.size > 0 || reqs.classes.size > 0) foundAny = true;
                }
                if (!foundAny) return empty;
                return { types: allTypes, classes: allClasses, unrestricted: false };
            }

            return _extractReqsSingleText(captainText);
        }

        // 멤버 캐릭이 captain 요구에 맞는지 (type 또는 class 중 하나라도 매치)
        //   듀얼 캐릭(type=null)은 sub-character의 type/class도 함께 체크
        //   (예: 4551 type=null이지만 4551-1=QCK, 4551-2=INT — 어느 하나라도 매치하면 호환)
        function isMemberCompatibleWithCaptain(memberId, reqs) {
            if (!reqs || reqs.unrestricted) return true;
            const meta = getUnitMeta(memberId);
            if (!meta) return true;

            // 모든 type/class 후보 수집 (메인 + sub-character)
            const allTypes = new Set();
            const allClasses = new Set();
            if (meta.type) allTypes.add(meta.type);
            const mainCs = Array.isArray(meta.class) ? meta.class : (meta.class ? [meta.class] : []);
            mainCs.forEach(c => allClasses.add(c));
            // 듀얼 캐릭 sub-character 검사
            for (let i = 1; i <= 2; i++) {
                const subMeta = getUnitMeta(`${memberId}-${i}`);
                if (subMeta?.type) allTypes.add(subMeta.type);
                const subCs = Array.isArray(subMeta?.class) ? subMeta.class : (subMeta?.class ? [subMeta.class] : []);
                subCs.forEach(c => allClasses.add(c));
            }

            for (const t of allTypes) if (reqs.types.has(t)) return true;
            for (const c of allClasses) if (reqs.classes.has(c)) return true;
            return false;
        }

        // 한 캐릭터의 모든 효과 소스에서 기믹 해제 효과 평가
        //   role: 'captain' | 'member'
        //   반환: { max: 최대 회복 턴, sources: [{type, turns}, ...] }
        function evaluateCharReductionSources(data, gimmickName, role, opts = {}) {
            const sources = [];
            if (!data) return { max: 0, sources };

            // suppressSpecial: 필살기 턴 되돌리기로 인해 이 캐릭의 special 사용 불가
            if (!opts.suppressSpecial) {
                const sp = getReductionTurns(data.special, gimmickName, opts);
                if (sp > 0) sources.push({ type: '필살기', turns: sp });
            }

            if (role === 'captain') {
                const cp = getReductionTurns(data.captain, gimmickName, opts);
                if (cp > 0) sources.push({ type: '선장효과', turns: cp });
            } else {
                const cm = getReductionTurns(data.crewman, gimmickName, opts);
                if (cm > 0) sources.push({ type: '선원효과', turns: cm });
            }

            // 선원효과(sailor) — 모든 메인 슬롯 캐릭터에 적용
            if (data.sailor) {
                const txt = typeof data.sailor === 'object' ? Object.values(data.sailor).join('. ') : String(data.sailor);
                const sl = getReductionTurns(txt, gimmickName, opts);
                if (sl > 0) sources.push({ type: '선원효과', turns: sl });
            }

            // 체인지(swap)
            if (data.swap) {
                const txt = typeof data.swap === 'object' ? Object.values(data.swap).join('. ') : String(data.swap);
                const sw = getReductionTurns(txt, gimmickName, opts);
                if (sw > 0) sources.push({ type: '체인지', turns: sw });
            }

            // 초월진화(superSpecial) — 선장일 때만 (또는 "자신이 선원일 때도" 명시 시 선원도)
            if (data.superSpecial) {
                const ssRaw = typeof data.superSpecial === 'object' ? JSON.stringify(data.superSpecial) : String(data.superSpecial);
                const usableAsMember = ssRaw.includes('자신이 선원일 때도');
                const canUseHere = (role === 'captain') || usableAsMember;
                if (canUseHere) {
                    const ss = getReductionTurns(data.superSpecial, gimmickName, opts);
                    if (ss > 0) sources.push({ type: '초월', turns: ss });
                }
            }

            const max = sources.reduce((m, s) => Math.max(m, s.turns), 0);
            return { max, sources };
        }

        // 캐릭터 이름을 구성 캐릭으로 분해 ("루피&브로기" → ["루피", "브로기"])
        function _splitCharNames(name) {
            if (!name) return [];
            return name.split(/[&+/]|\s와\s|\s과\s/).map(s => s.trim()).filter(s => s.length > 0);
        }

        // 두 캐릭이 동일/포함 캐릭인지 (루피 vs 루피&브로기 → 같은 캐릭으로 간주)
        function _shareCharacter(nameA, nameB) {
            if (!nameA || !nameB) return false;
            if (nameA === nameB) return true;
            const compsA = _splitCharNames(nameA);
            const compsB = _splitCharNames(nameB);
            for (const a of compsA) {
                for (const b of compsB) {
                    if (a.length < 2 || b.length < 2) continue;
                    if (a === b) return true;
                    if (a.includes(b) || b.includes(a)) return true;
                }
            }
            return false;
        }

        function _charTextBlob(charId) {
            const data = window.details_kor[charId];
            if (!data) return '';
            const fields = [
                data.captain,
                data.sailor ? Object.values(data.sailor).join('. ') : '',
                data.special,
                data.swap ? Object.values(data.swap).join('. ') : '',
                data.superSpecial,
                data.lLimit
            ];
            return fields.map(t => typeof t === 'object' ? JSON.stringify(t) : String(t || '')).join(' ');
        }

        // 슬롯 고정 효과 보유 여부
        function _hasSlotLockEffect(charId) {
            const blob = _charTextBlob(charId);
            return /슬롯[을이]?\s*\d+턴\s*(동안)?\s*고정|슬롯[을]?\s*완전히\s*고정/.test(blob);
        }

        // 변환 불가 슬롯([RAINBOW]/[WANO]/[셈라]) 생성 효과 보유 여부
        // 패턴: "슬롯을 [X] 슬롯으로 바꾼다", "[X] 슬롯을 출현시킨다" 등
        function _hasUnconvertibleSlotGen(charId) {
            const blob = _charTextBlob(charId);
            const types = ['RAINBOW', 'WANO', 'SEMLA', '셈라', '무지개'];
            for (const t of types) {
                const esc = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                if (new RegExp(`슬롯[을]?[^"\\.]{0,20}\\[?${esc}\\]?\\s*슬롯[으로]*\\s*(바꾼다|만든다)`).test(blob)) return true;
                if (new RegExp(`\\[?${esc}\\]?\\s*슬롯[을]?[^"\\.]{0,20}(출현|부여)`).test(blob)) return true;
            }
            return false;
        }

        // 슬롯 변환 기믹 식별 ([XXX]슬롯 변환 형태)
        function _isSlotConversionGimmick(name) {
            return /\[[^\]]+\]\s*슬롯\s*변환/.test(name);
        }

        // 필살기 재충전(추가 사용 가능) 효과 보유 여부 — 보수적 매칭
        // 명확한 재충전 표현만 인정:
        //   "필살기 (다시) 사용 가능 (상태로/하게)"
        //   "필살기 턴을 채운다 / 채워준다"
        // 단순 "필살기 턴 X턴 단축"은 부분 쿨감이라 재충전으로 보지 않음 (게임상 2회 사용 보장 X)
        function _hasSpecialRefillEffect(charId) {
            const data = window.details_kor[charId];
            if (!data) return false;
            const blob = _charTextBlob(charId);
            const refillPattern = /필살기[를을]?\s*(다시\s*)?사용\s*가능[한하상]|필살기\s*턴[을이]?\s*채운다|필살기\s*턴[을이]?\s*채워준다/g;
            let m;
            while ((m = refillPattern.exec(blob)) !== null) {
                const before = blob.substring(Math.max(0, m.index - 50), m.index);
                if (/모험 시작 시/.test(before)) continue;
                return true;
            }
            return false;
        }

        // captain 텍스트에서 가장 높은 공격 배수 추출
        // 매칭: "공격력이 5배가 된다", "공격력을 5.25배로 만든다" 등
        function getAttackMultiplier(captainText) {
            if (!captainText) return 0;
            const text = typeof captainText === 'object' ? JSON.stringify(captainText) : String(captainText);
            const regex = /공격력[을이]\s*(\d+(?:\.\d+)?)\s*배/g;
            let max = 0;
            let m;
            while ((m = regex.exec(text)) !== null) {
                const v = parseFloat(m[1]);
                if (v > max) max = v;
            }
            return max;
        }

        // 메인 캐릭터에 서포트 장착 가능 여부 — target 문자열을 의미론적으로 파싱하여 매칭
        //   strict: 정확히 매칭 가능
        //   loose : target이 모호해서 판정 불가 (조심스럽게 fallback 허용)
        //   reject: target 제약 분명한데 main이 충족 못함 (절대 매칭 안 됨)
        function checkSupportFit(target, mainId) {
            if (!target) return 'loose';
            if (target.includes("모든 캐릭터") || target.includes("전 캐릭터")) return 'strict';

            const u = getUnitMeta(mainId);
            if (!u) return 'loose';

            // 코스트 제약 검사 (예: "코스트 29 이하 캐릭터", "코스트가 99 이상인 캐릭터", "코스트는 40 이하")
            // 조사(가/는/의) 등이 끼어도 매칭하도록 [^\d]{0,5} 허용
            // 충족 못하면 즉시 reject (절대 장착 불가)
            const costMatch = target.match(/코스트[^\d]{0,5}(\d+)\s*(이하|이상)/);
            if (costMatch) {
                const limit = parseInt(costMatch[1]);
                const direction = costMatch[2];
                const mainCost = u.cost;
                if (typeof mainCost === 'number') {
                    if (direction === '이하' && mainCost > limit) return 'reject';
                    if (direction === '이상' && mainCost < limit) return 'reject';
                    // 충족 시: 다른 제약이 없으면 strict (이 텍스트만 있는 경우), 있으면 후속 체크
                }
            }

            let hasNameRestriction = false;
            let hasTagRestriction = false;
            let hasTypeClassRestriction = false;

            // 1) 이름 매칭
            //   1-1) 본인 이름이 target에 포함되면 strict
            //   1-2) target에 다른 캐릭터의 이름 컴포넌트가 포함되어 있다면 hasNameRestriction
            //        (단일 이름 "상디", 리스트 "헤르메포, 가프", 또는 풀네임 "몽키 D. 루피" 모두 커버)
            if (u.name && _shareCharacter(target, u.name)) return 'strict';
            // 콤마/D. 포함 패턴 → 이름 리스트
            if (/[가-힣]+\s*,\s*[가-힣]+/.test(target) || /D\./.test(target)) {
                hasNameRestriction = true;
            }
            // 단일 이름 케이스: target에 한글이 있고 일반 제약 키워드/태그가 전혀 없으면 캐릭터 이름으로 간주
            //   ("상디" 같은 단일 한글 이름)
            if (!hasNameRestriction) {
                const hasGeneralKeyword = /(캐릭터|속성|클래스|코스트|타입|또는|이상|이하|모든|일당|자신|적|전\s|전 캐릭|전체|회복|상태|효과|배|배수|턴|동안)/.test(target);
                const hasBracket = /\[/.test(target);
                if (/[가-힣]/.test(target) && !hasGeneralKeyword && !hasBracket) {
                    hasNameRestriction = true;
                }
            }

            // 2) 태그 매칭 — orb 슬롯명 제외한 [XXX] 태그
            const targetTagMatches = (target.match(/\[([^\]]+)\]/g) || [])
                .map(t => t.replace(/[\[\]]/g, ''))
                .filter(t => !ORB_BRACKET_NAMES.has(t));
            if (targetTagMatches.length > 0) hasTagRestriction = true;

            const data = window.details_kor[mainId];
            if (data) {
                const mainTags = new Set();
                for (const src of [data.captain, data.lLimit, data.special]) {
                    extractTagsFromText(src).forEach(t => mainTags.add(t));
                }
                for (const t of mainTags) {
                    if (target.includes(`[${t}]`)) return 'strict';
                }
            }

            // 3) 속성/클래스 요구사항 추출
            const requiredTypes = new Set();
            const requiredClasses = new Set();
            for (const [eng, kor] of Object.entries(TYPE_KOR)) {
                if (target.includes(`${kor} 속성`)) requiredTypes.add(eng);
            }
            for (const [eng, kor] of Object.entries(CLASS_KOR)) {
                if (target.includes(kor)) requiredClasses.add(eng);
            }
            if (requiredTypes.size > 0 || requiredClasses.size > 0) {
                hasTypeClassRestriction = true;
                const mainClasses = Array.isArray(u.class) ? u.class : (u.class ? [u.class] : []);
                const typeOk = requiredTypes.size === 0 || requiredTypes.has(u.type);
                const classOk = requiredClasses.size === 0 || mainClasses.some(c => requiredClasses.has(c));
                const isOr = target.includes('또는');
                if (isOr ? (typeOk || classOk) : (typeOk && classOk)) return 'strict';
            }

            // 명확한 제약(태그/이름/속성/클래스)이 있는데 strict 매칭 실패 → 절대 매칭 안 되므로 reject
            if (hasNameRestriction || hasTagRestriction || hasTypeClassRestriction) return 'reject';

            // 코스트 제약만 있고 충족했다면 strict (다른 제약 인식 안 됨)
            if (costMatch) return 'strict';

            // 어떤 제약도 인식 못하면 loose (fallback 허용)
            return 'loose';
        }

        // 매칭 위치의 효과 대상 분류: 'party'/'support_target'/'self'/'unknown'
        //   매칭 직전 구문에서 가장 가까운(마지막) scope 마커가 결정.
        //   "적 전체에게 걸려 있는 X 줄인다" 같은 enemy-side 효과는 party로 취급 (모두에게 효과 적용).
        function _matchTargetScope(text, matchStart) {
            let clauseStart = Math.max(0, matchStart - 100);
            const sep1 = text.lastIndexOf('다.', matchStart);
            if (sep1 > clauseStart) clauseStart = sep1 + 2;
            const sep2 = text.lastIndexOf('. ', matchStart);
            if (sep2 > clauseStart) clauseStart = sep2 + 2;
            const before = text.substring(clauseStart, matchStart);

            // 각 마커의 마지막 등장 위치 검출
            const lastIdx = (re) => {
                let pos = -1;
                let m;
                re.lastIndex = 0;
                while ((m = re.exec(before)) !== null) {
                    if (m.index > pos) pos = m.index;
                }
                return pos;
            };

            const enemyPos = lastIdx(/적\s*전체|적[을의에는]/g);            // 적 측 (보스)
            const partyPos = lastIdx(/일당|모든\s*캐릭터/g);                  // 일당 (아군)
            const stPos    = lastIdx(/서포트\s*대상/g);                       // 서포트 대상 캐릭
            const selfPos  = lastIdx(/자신/g);                                // 자신
            const totalPos = lastIdx(/전체/g);                                // 모호한 '전체'

            // 가장 큰 위치(가장 가까운) 마커가 결정
            const candidates = [
                { pos: enemyPos, scope: 'party' },     // 적 측 = 모두에게 영향 (party 카운트)
                { pos: partyPos, scope: 'party' },
                { pos: stPos,    scope: 'support_target' },
                { pos: selfPos,  scope: 'self' },
                { pos: totalPos, scope: 'party' }      // '전체'만 단독 등장 시 party 간주
            ].filter(c => c.pos >= 0).sort((a, b) => b.pos - a.pos);

            return candidates.length > 0 ? candidates[0].scope : 'unknown';
        }

        // 서포트 효과의 기믹 회복 평가 (scope 인식)
        //   pairedMainAffected: 짝지어진 메인 슬롯이 기믹 영향 범위 안인지
        //   isPartyWideGimmick: 기믹이 일당 전체 영향인지 (true면 대상캐 효과는 1명만 풀려서 카운트 안 함)
        //   반환: { turns: 회복 턴, label: '일당'/'대상캐'/'자신'/'' (출력용) }
        function evaluateSupportContribution(effectText, gimmickName, pairedMainAffected, isPartyWideGimmick) {
            if (!effectText) return { turns: 0, label: '' };
            const aliases = GIMMICK_ALIASES[gimmickName];
            const targetNames = [];
            if (aliases === undefined) targetNames.push(gimmickName);
            else {
                const items = Array.isArray(aliases) ? aliases : [aliases];
                for (const a of items) {
                    if (typeof a === 'string') targetNames.push(a);
                    else if (a && a.regex && a.regex.test(effectText)) {
                        return { turns: a.turns || 1, label: '' };
                    }
                }
            }
            let max = 0, bestLabel = '';
            for (const name of targetNames) {
                if (!effectText.includes(name)) continue;
                const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`${escaped}[^\\d]{0,20}(\\d+)`, 'g');
                let m;
                while ((m = regex.exec(effectText)) !== null) {
                    const scope = _matchTargetScope(effectText, m.index);
                    const turns = parseInt(m[1]);
                    let counts = false, label = '';
                    if (scope === 'party') { counts = true; label = '일당'; }
                    else if (scope === 'support_target') {
                        // 대상캐 효과는 짝지어진 1명만 회복
                        // 일당 전체 기믹이면 1명만 풀려서 일당 해제에 유효 카운트 안 됨
                        counts = pairedMainAffected && !isPartyWideGimmick;
                        label = '대상캐';
                    }
                    else if (scope === 'self') { counts = false; label = '자신'; } // support char itself
                    else { counts = true; label = ''; }
                    if (counts && turns > max) { max = turns; bestLabel = label; }
                }
            }
            return { turns: max, label: bestLabel };
        }

        // 매칭이 self-only인지 판정 — 가장 가까운(마지막) scope 마커가 결정
        //   매칭 직전 100자 (또는 마지막 문장 종결자 이후 구간)에서:
        //     selfPos vs partyPos vs enemyPos 비교 → selfPos가 가장 마지막이면 self-only
        //   같은 클로즈 안에 "일당은 ... 자신은 ... 매칭" 처럼 두 마커가 모두 있어도,
        //   매칭 직전(가장 가까운) 마커가 "자신"이면 self-only로 정확히 분류됨.
        function _isSelfOnlyContext(text, matchStart) {
            let clauseStart = Math.max(0, matchStart - 100);
            const sep1 = text.lastIndexOf('다.', matchStart);
            if (sep1 > clauseStart) clauseStart = sep1 + 2;
            const sep2 = text.lastIndexOf('. ', matchStart);
            if (sep2 > clauseStart) clauseStart = sep2 + 2;
            const before = text.substring(clauseStart, matchStart);

            const lastIdx = (re) => {
                let pos = -1, m;
                re.lastIndex = 0;
                while ((m = re.exec(before)) !== null) {
                    if (m.index > pos) pos = m.index;
                }
                return pos;
            };
            const selfPos = lastIdx(/자신/g);
            const partyPos = lastIdx(/일당|모든\s*캐릭터|서포트\s*대상/g);
            const enemyPos = lastIdx(/적\s*전체|적[을의에는]/g);
            const totalPos = lastIdx(/전체/g);

            // 가장 큰(가까운) 위치의 마커가 self이면 self-only
            const partyMax = Math.max(partyPos, enemyPos, totalPos);
            return selfPos >= 0 && selfPos > partyMax;
        }

        function _findTurnsByName(targetText, name, opts = {}) {
            const includeSelfOnly = !!opts.includeSelfOnly;
            if (!targetText.includes(name)) return 0;
            const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`${escaped}[^\\d]{0,20}(\\d+)`, 'g');
            let max = 0;
            let m;
            while ((m = regex.exec(targetText)) !== null) {
                if (!includeSelfOnly && _isSelfOnlyContext(targetText, m.index)) continue;
                const v = parseInt(m[1]);
                if (v > max) max = v;
            }
            // fallback: gimmick name이 있는데 숫자가 인접 안 한 경우 1턴 처리
            if (max === 0 && targetText.includes(name)) {
                const idx = targetText.indexOf(name);
                if (includeSelfOnly || !_isSelfOnlyContext(targetText, idx)) return 1;
            }
            return max;
        }

        function getReductionTurns(rawText, gimmickName, opts = {}) {
            if (!rawText) return 0;
            let targetText = typeof rawText === 'object' ? JSON.stringify(rawText) : String(rawText);
            // 방어력 감소 무효 (보스 선제) — 같은 라운드에 이 패턴이 있으면 "방어력 0으로" 효과 무력화
            let armorReductionDisabled = !!opts.armorReductionDisabled;
            if (!armorReductionDisabled && opts.round !== undefined) {
                armorReductionDisabled = activeGimmicks[opts.round]?.some(g => g.name === "방어력 감소 무효") || false;
            }
            // 방어력 상승: "방어력을 0으로" 같은 우회 효과는 → 99턴 처리
            //   단, 방어력 감소 무효 활성 시 우회 효과 무력화 (직접 "방어력 상승 상태 회복"만 유효)
            if (gimmickName === "방어력 상승" && targetText.includes("방어력을 0으로") && !armorReductionDisabled) return 99;
            if (gimmickName === "봉쇄") {
                // 다른 종류의 봉쇄 상태(필살기 봉쇄, 슬롯 봉쇄)는 별도 기믹이므로 마스킹
                targetText = targetText.replace(/필살기\s?봉쇄/g, "SPECIAL_SEAL_TEMP");
                targetText = targetText.replace(/슬롯\s?봉쇄/g, "SLOT_SEAL_TEMP");
            }
            if (gimmickName === "공격력 감소") {
                // 슬롯 관련 공격력 감소(특정 슬롯 사용 시 공격력 감소 등)는 별도 기믹이므로 마스킹
                //   - "슬롯 사용 시 공격력 감소" / "특정 슬롯 사용 시 공격력 감소" 등 직접 트리거 패턴만
                //   - 너무 넓은 마스킹은 정상적인 "공격력 감소 회복" 같은 문구를 가려버리므로
                //     반드시 "사용 시" 트리거를 요구
                targetText = targetText.replace(/(특정\s*)?슬롯\s*사용\s*시[^.\!\?]{0,10}공격력\s*감소/g, "SLOT_ATK_DOWN_TEMP");
                targetText = targetText.replace(/\[[^\]]+\]\s*슬롯\s*사용\s*시[^.\!\?]{0,10}공격력\s*감소/g, "SLOT_ATK_DOWN_TEMP");
            }

            const aliases = GIMMICK_ALIASES[gimmickName];
            if (aliases === undefined) {
                return _findTurnsByName(targetText, gimmickName, opts);
            }
            // 별칭이 배열/객체/문자열 어떤 형태든 처리
            const items = Array.isArray(aliases) ? aliases : [aliases];
            let max = 0;
            for (const a of items) {
                if (typeof a === 'string') {
                    max = Math.max(max, _findTurnsByName(targetText, a, opts));
                } else if (a && a.regex && a.regex.test(targetText)) {
                    max = Math.max(max, a.turns || 1);
                }
            }
            return max;
        }

        // 기믹별 솔버 후보 캐시 (성능 최적화)
        //   각 기믹에 대해 details_kor 전체에서 어떤 캐릭이 어떤 효과로 풀 수 있는지 사전 계산
        //   _buildDeckSingle이 여러 번 호출돼도 1회만 계산
        //   activeGimmicks/round 변경 시 무효화 필요 → 빌드 시작 시 reset
        window.__gimmickSolverCache = window.__gimmickSolverCache || {};
        function _resetGimmickSolverCache() { window.__gimmickSolverCache = {}; }
        function _getGimmickSolvers(gimmickName) {
            if (window.__gimmickSolverCache[gimmickName]) return window.__gimmickSolverCache[gimmickName];
            const solvers = new Set();
            for (const id in window.details_kor) {
                const data = window.details_kor[id];
                if (!data) continue;
                // 어떤 source라도 turn > 0이면 솔버 가능성
                if (getReductionTurns(data.captain, gimmickName) > 0) { solvers.add(id); continue; }
                if (getReductionTurns(data.special, gimmickName) > 0) { solvers.add(id); continue; }
                if (getReductionTurns(data.crewman, gimmickName) > 0) { solvers.add(id); continue; }
                if (data.sailor) {
                    const txt = typeof data.sailor === 'object' ? Object.values(data.sailor).join('. ') : String(data.sailor);
                    if (getReductionTurns(txt, gimmickName) > 0) { solvers.add(id); continue; }
                }
                if (data.swap) {
                    const txt = typeof data.swap === 'object' ? Object.values(data.swap).join('. ') : String(data.swap);
                    if (getReductionTurns(txt, gimmickName) > 0) { solvers.add(id); continue; }
                }
                if (data.superSpecial && getReductionTurns(data.superSpecial, gimmickName) > 0) {
                    solvers.add(id); continue;
                }
            }
            window.__gimmickSolverCache[gimmickName] = solvers;
            return solvers;
        }

        // 덱 + 기믹 리스트로부터 currentTurns/solved 정확히 재계산
        //   필살기는 라운드당 1회만 사용 가능 (재충전 보유 캐릭은 2회), 같은 라운드 내 여러 기믹은 1회 trigger로 동시 처리
        //   non-special 효과(captain, sailor, swap, 초월)는 모든 라운드에 항상 적용
        function _recomputeGimmickStates(deck, remainingGimmicks) {
            // Reset
            for (const rg of remainingGimmicks) {
                let init = rg.turn;
                if (rg.name === "선장효과 무효" || rg.name === "봉쇄") init = Math.max(0, init - 3);
                rg.currentTurns = init;
                // 방어력 감소 무효: 보스 선제 (해제 불가, 평가에 영향만 줌) → 자동 solved
                if (rg.name === "방어력 감소 무효") {
                    rg.solved = true;
                } else if (rg.turn === 0) {
                    // 즉발 기믹(원래 turn=0, 슬롯 변환 등)은 회복 효과 commit이 실제로 필요 → unsolved로 시작
                    rg.solved = false;
                } else {
                    // 능력해방 등으로 init=0이 된 기믹(선장효과 무효/봉쇄)은 그대로 solved
                    rg.solved = init <= 0;
                }
            }

            // 1단계: non-special 효과를 모든 기믹에 적용
            for (const [slot, id] of Object.entries(deck)) {
                if (!id) continue;
                if (slot.startsWith('s')) continue;
                if (slot === 'f1' && String(deck.c1) === String(id)) continue;
                const data = window.details_kor[id];
                const role = (slot === 'c1' || slot === 'f1') ? 'captain' : 'member';
                for (const rg of remainingGimmicks) {
                    if (rg.solved) continue;
                    const isPartyWide = !rg.scope || (rg.scope.row === 'all' && rg.scope.col === 'all');
                    const inScope = isSlotAffected(slot, rg.scope);
                    const includeSelfOnly = !isPartyWide && inScope;
                    const rewindHere = remainingGimmicks.some(other =>
                        other.round === rg.round &&
                        other.name === '필살기 턴 되돌리기' &&
                        isSlotAffected(slot, other.scope)
                    );
                    const sailorTxt = data?.sailor ? Object.values(data.sailor).join('. ') : '';
                    const hasSelfRewindRecov = sailorTxt.includes('필살기 턴 되돌리기') && /자신/.test(sailorTxt);
                    const suppressSpecial = rg.name !== '필살기 턴 되돌리기' && rewindHere && !hasSelfRewindRecov;
                    const { sources } = evaluateCharReductionSources(data, rg.name, role, { includeSelfOnly, suppressSpecial, round: rg.round });
                    const nonSpecialMax = sources.filter(s => s.type !== '필살기').reduce((m, s) => Math.max(m, s.turns), 0);
                    rg.currentTurns -= nonSpecialMax;
                    if (rg.currentTurns <= 0) rg.solved = true;
                }
            }

            // 2단계: per-round 필살기 커밋 (각 라운드별로 필요한 만큼만 commit)
            //   추적 단위는 슬롯(slot) — 같은 캐릭(id)이 친구+멤버 등 복수 슬롯에 있으면 각 슬롯이 독립적으로 1회씩 사용 가능
            const specialUsedTracker = {};  // slot -> round (이 라운드에 커밋됨)
            const specialUsedCount = {};    // slot -> count (총 사용 횟수)
            const rounds = [...new Set(remainingGimmicks.map(g => g.round))].sort((a, b) => a - b);

            for (const round of rounds) {
                const roundGimmicks = remainingGimmicks.filter(g => g.round === round);
                const rewindGimmicks = roundGimmicks.filter(g => g.name === '필살기 턴 되돌리기');
                const isSlotRewound = (slot) => rewindGimmicks.some(rg => isSlotAffected(slot, rg.scope));
                const hasSelfRewindRecov = (id) => {
                    const d = window.details_kor[id];
                    if (!d?.sailor) return false;
                    const txt = Object.values(d.sailor).join('. ');
                    return txt.includes('필살기 턴 되돌리기') && /자신/.test(txt);
                };

                for (const g of roundGimmicks) {
                    if (g.solved) continue;
                    const isPartyWide = !g.scope || (g.scope.row === 'all' && g.scope.col === 'all');

                    // 이미 같은 라운드에 commit된 special의 추가 기여 + 미커밋 후보 수집
                    const candidates = [];
                    for (const [slot, id] of Object.entries(deck)) {
                        if (!id) continue;
                        if (slot.startsWith('s')) continue;
                        if (slot === 'f1' && String(deck.c1) === String(id)) continue;
                        const data = window.details_kor[id];
                        const role = (slot === 'c1' || slot === 'f1') ? 'captain' : 'member';
                        const inScope = isSlotAffected(slot, g.scope);
                        const includeSelfOnly = !isPartyWide && inScope;
                        const suppressSpecial = g.name !== '필살기 턴 되돌리기' && isSlotRewound(slot) && !hasSelfRewindRecov(id);
                        const { sources } = evaluateCharReductionSources(data, g.name, role, { includeSelfOnly, suppressSpecial, round });
                        const specialSrc = sources.find(s => s.type === '필살기');
                        if (!specialSrc || specialSrc.turns <= 0) continue;
                        if (specialUsedTracker[slot] === round) {
                            // 이 슬롯이 이미 이 라운드에 commit됨 — 추가 기여
                            g.currentTurns -= specialSrc.turns;
                            if (g.currentTurns <= 0) { g.solved = true; break; }
                        } else {
                            const allowedUses = _hasSpecialRefillEffect(id) ? 2 : 1;
                            const used = specialUsedCount[slot] || 0;
                            if (used < allowedUses) candidates.push({ slot, id, turns: specialSrc.turns });
                        }
                    }
                    if (g.solved) continue;

                    // 부족한 만큼 새 special 커밋
                    candidates.sort((a, b) => b.turns - a.turns);
                    const target = Math.max(g.turn, 1);
                    for (const c of candidates) {
                        if (g.currentTurns <= 0) break;
                        specialUsedCount[c.slot] = (specialUsedCount[c.slot] || 0) + 1;
                        specialUsedTracker[c.slot] = round;
                        g.currentTurns -= c.turns;
                        if (g.currentTurns <= 0) g.solved = true;
                    }
                }
            }
        }

        // 비동기 버전 — 슬롯별 처리 사이에 setTimeout 삽입해 시각적 갱신 가능
        //   각 슬롯 처리 시: 슬롯 강조 → swap 시도 → 결과 적용 → 화면 갱신 → 다음 슬롯
        function _intensiveOptimizeAsync(deck, remainingGimmicks, captainReqs, friendReqs, usedIds, usedNames, onDone) {
            const memberSlots = ['m1','m2','m3','m4'];
            const MAX_ITER = 4;
            const protectedBoostIdSet = new Set(
                (boostChars || []).filter(b => b.rank === 'A' || b.rank === 'B').map(b => String(b.id))
            );
            const preferredIdSet = new Set((preferredChars || []).map(String));

            const isCompatBoth = (id) => {
                if (!isMemberCompatibleWithCaptain(id, captainReqs)) return false;
                if (friendReqs && !friendReqs.unrestricted) {
                    if (!isMemberCompatibleWithCaptain(id, friendReqs)) return false;
                }
                return true;
            };
            const scoreState = () => {
                const unsolved = remainingGimmicks.filter(rg => !rg.solved).length;
                const totalRed = remainingGimmicks.reduce((s, rg) =>
                    s + Math.max(0, rg.turn - Math.max(0, rg.currentTurns)), 0);
                return { unsolved, totalRed };
            };
            const isBetter = (a, b) => {
                if (a.unsolved < b.unsolved) return true;
                if (a.unsolved > b.unsolved) return false;
                return a.totalRed > b.totalRed;
            };

            const candidatePoolSet = new Set();
            for (const rg of remainingGimmicks) {
                const solverIds = _getGimmickSolvers(rg.name);
                for (const id of solverIds) candidatePoolSet.add(String(id));
            }
            for (const b of (boostChars || [])) candidatePoolSet.add(String(b.id));
            const candidatePool = [...candidatePoolSet].sort((a, b) => (parseInt(b) || 0) - (parseInt(a) || 0));

            let iter = 0;
            let slotIdx = 0;
            let improvedThisIter = false;

            const _highlightSlot = (slot, on) => {
                const el = document.querySelector(`#img-${slot}`)?.closest('.slot');
                if (el) el.classList.toggle('searching', on);
            };

            const processNextSlot = () => {
                if (iter >= MAX_ITER) { onDone && onDone(); return; }
                if (slotIdx >= memberSlots.length) {
                    // iter 종료 — 개선 없으면 stop
                    if (!improvedThisIter) { onDone && onDone(); return; }
                    iter++;
                    slotIdx = 0;
                    improvedThisIter = false;
                    if (iter >= MAX_ITER) { onDone && onDone(); return; }
                }

                const slot = memberSlots[slotIdx];
                slotIdx++;

                const currentId = deck[slot];
                if (!currentId
                    || preferredIdSet.has(String(currentId))
                    || protectedBoostIdSet.has(String(currentId))) {
                    setTimeout(processNextSlot, 0);
                    return;
                }

                _highlightSlot(slot, true);

                const currentScore = scoreState();
                let bestAltId = null;
                let bestAltScore = currentScore;

                const otherDeckIds = new Set(Object.values(deck).map(String).filter(Boolean));
                otherDeckIds.delete(String(currentId));
                const otherDeckNames = new Set();
                for (const did of otherDeckIds) {
                    const u = getUnitMeta(did);
                    if (u?.name) otherDeckNames.add(u.name);
                }

                for (const altId of candidatePool) {
                    if (String(altId) === String(currentId)) continue;
