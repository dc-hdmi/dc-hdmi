<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>트갤 공동전투 선장효과</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #111;
            color: #eee;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 16px 0;
            border-left: 5px solid #00ffcc;
            padding-left: 12px;
        }

        .role-tabs {
            display: flex;
            gap: 6px;
            border-bottom: 2px solid #333;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .role-tab {
            background: #222;
            color: #888;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.15s;
            margin-bottom: -2px;
        }
        .role-tab:hover { color: #fff; background: #333; }
        .role-tab.active {
            background: #00ffcc;
            color: #000;
            border-bottom: 2px solid #00ffcc;
        }

        .sub-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .sub-tab {
            background: #1c1c1c;
            color: #aaa;
            border: 1px solid #333;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.15s;
        }
        .sub-tab:hover { color: #fff; background: #2a2a2a; }
        .sub-tab.active {
            background: #ffaa00;
            color: #000;
            border-color: #ffaa00;
        }

        .type-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .type-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid transparent;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s,
                        opacity 0.15s, filter 0.15s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            flex-shrink: 0;
            padding: 0;
            opacity: 0.45;
            filter: saturate(0.6) brightness(0.85);
        }
        .type-btn:hover {
            transform: scale(1.08);
            opacity: 0.85;
            filter: saturate(0.9);
        }
        .type-btn.active {
            opacity: 1;
            filter: saturate(1.25) brightness(1.1);
            border-color: #fff;
            transform: scale(1.2);
            animation: typeBtnPulse 1.2s ease-in-out infinite;
        }
        @keyframes typeBtnPulse {
            0%, 100% {
                border-color: #fff;
                box-shadow:
                    0 0 6px var(--glow, #fff),
                    0 0 14px var(--glow, #fff),
                    0 0 22px var(--glow, #fff);
            }
            50% {
                border-color: rgba(255,255,255,0.35);
                box-shadow:
                    0 0 10px var(--glow, #fff),
                    0 0 22px var(--glow, #fff),
                    0 0 36px var(--glow, #fff),
                    0 0 52px var(--glow, #fff);
            }
        }
        .type-btn.type-str { background: #d32f2f; --glow: #ff5252; }
        .type-btn.type-dex { background: #43a047; --glow: #69f0ae; }
        .type-btn.type-qck { background: #1976d2; --glow: #40c4ff; }
        .type-btn.type-psy { background: #fbc02d; color: #222; text-shadow: none; --glow: #ffeb3b; }
        .type-btn.type-int { background: #8e24aa; --glow: #d05ce3; }

        .description {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .lv-section {
            background: #1c1c1c;
            border: 1px solid #333;
            border-left: 4px solid #00ffcc;
            border-radius: 6px;
            padding: 12px 14px;
        }
        .lv-label {
            display: inline-block;
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .lv-section[data-lv="1"] { border-left: 3px solid rgba(0,255,204,0.25); }
        .lv-section[data-lv="2"] { border-left: 4px solid rgba(0,255,204,0.45); }
        .lv-section[data-lv="3"] { border-left: 5px solid rgba(0,255,204,0.65); }
        .lv-section[data-lv="4"] { border-left: 6px solid rgba(0,255,204,0.85); }
        .lv-section[data-lv="5"] {
            border-left: 8px solid #00ffcc;
            box-shadow: inset 6px 0 18px rgba(0,255,204,0.18);
        }

        .lv-section[data-lv="1"] .lv-label { color: #b2dfdb; background: rgba(0,255,204,0.06);  border: 1px solid rgba(0,255,204,0.20); }
        .lv-section[data-lv="2"] .lv-label { color: #80deea; background: rgba(0,255,204,0.14);  border: 1px solid rgba(0,255,204,0.35); }
        .lv-section[data-lv="3"] .lv-label { color: #4dd0e1; background: rgba(0,255,204,0.25);  border: 1px solid rgba(0,255,204,0.50); }
        .lv-section[data-lv="4"] .lv-label { color: #0d1f1c; background: rgba(0,255,204,0.55);  border: 1px solid rgba(0,255,204,0.80); font-weight: 800; }
        .lv-section[data-lv="5"] .lv-label {
            color: #0d1f1c; background: #00ffcc; border: 1px solid #00ffcc;
            font-weight: 900;
            box-shadow: 0 0 10px rgba(0,255,204,0.55);
        }
        .lv-body {
            font-size: 14px;
            color: #aaa;
            font-style: italic;
            white-space: pre-wrap;
            word-break: keep-all;
        }
        .lv-body.filled {
            color: #ddd;
            font-style: normal;
        }

        .special-box {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 8px;
        }
        .special-box + .special-box { margin-top: 10px; }
        .special-title {
            display: inline-block;
            font-size: 12px;
            font-weight: 900;
            padding: 3px 14px;
            border-radius: 999px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .special-title.adv,
        .special-title.duel {
            color: #ffeb3b;
            border: 2px solid #d4a017;
            text-shadow:
                -1px -1px 0 #000, 1px -1px 0 #000,
                -1px  1px 0 #000, 1px  1px 0 #000,
                 0   -1px 0 #000, 0    1px 0 #000,
                -1px  0   0 #000, 1px  0   0 #000;
            box-shadow:
                0 0 0 2px #2a1a08,
                inset 0 -10px 14px rgba(0,0,0,0.55),
                inset 0  6px 10px rgba(255,255,255,0.18);
        }
        .special-title.adv {
            background: linear-gradient(180deg, #66bb6a 0%, #2e7d32 55%, #1b5e20 100%);
        }
        .special-title.duel {
            background: linear-gradient(180deg, #ef5350 0%, #c62828 55%, #880e4f 100%);
        }
        .special-box .lv-body {
            margin: 0;
            padding: 0;
            border: none;
        }

        .type-text { font-weight: bold; }
        .type-text.type-str { color: #ff5252; }
        .type-text.type-dex { color: #69f0ae; }
        .type-text.type-qck { color: #40c4ff; }
        .type-text.type-psy { color: #ffeb3b; }
        .type-text.type-int { color: #d05ce3; }

        .type-slot {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 4px;
            font-weight: bold;
            background: rgba(255,170,0,0.15);
            border: 1px dashed rgba(255,170,0,0.5);
        }
        .type-slot.first  { color: #ff9800; }
        .type-slot.second { color: #4fc3f7; border-color: rgba(79,195,247,0.5); background: rgba(79,195,247,0.12); }

        .lv-section.action-section { border-left: 4px solid #ffaa00; }

        .action-note {
            background: rgba(255,170,0,0.10);
            border: 1px solid rgba(255,170,0,0.55);
            border-left: 3px solid #ffaa00;
            border-radius: 5px;
            padding: 6px 10px;
            margin-bottom: 8px;
            color: #ffd54f;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1.4;
        }
        .action-note .note-icon {
            font-size: 12px;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 17px; margin-bottom: 12px; }

            .role-tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scroll-snap-type: x proximity;
                padding-bottom: 4px;
                scrollbar-width: thin;
            }
            .role-tabs::-webkit-scrollbar { height: 3px; }
            .role-tabs::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
            .role-tab {
                flex: 0 0 auto;
                padding: 8px 12px;
                font-size: 12px;
                white-space: nowrap;
                scroll-snap-align: start;
            }

            .sub-tabs { gap: 4px; margin-bottom: 12px; }
            .sub-tab {
                flex: 1 1 0;
                padding: 7px 6px;
                font-size: 11px;
                text-align: center;
                white-space: nowrap;
            }

            .type-buttons {
                gap: 6px;
                justify-content: flex-start;
                margin-bottom: 14px;
            }
            .type-btn {
                width: 34px;
                height: 34px;
                font-size: 13px;
                border-width: 2px;
            }
            .type-btn.active { transform: scale(1.18); }
            .type-buttons { padding: 8px 4px; }

            .description { gap: 8px; }
            .lv-section { padding: 10px 12px; }
            .lv-label { font-size: 11px; padding: 2px 8px; }
            .lv-body { font-size: 13px; }
        }
    </style>
</head>

    <h1>공동전투 선장 효과</h1>

    <div class="role-tabs" id="role-tabs"></div>

    <div class="sub-tabs" id="sub-tabs"></div>

    <div class="type-buttons" id="type-buttons"></div>

    <div class="description" id="description"></div>

            { key: 'defense', label: '방어형'   },
            { key: 'heal',    label: '회복형'   },
            { key: 'support', label: '지원형'   },
            { key: 'debuff',  label: '디버프형' },
            { key: 'balance', label: '밸런스형' }
        ];

        const SUBS = [
            { key: 'captain', label: '공투 선장 효과'   },
            { key: 'special', label: '공투 선장 필살기' },
            { key: 'action',  label: '공투 선장 액션'   }
        ];

        const TYPES = [
            { key: 'str', label: '힘' },
            { key: 'dex', label: '기' },
            { key: 'qck', label: '속' },
            { key: 'psy', label: '심' },
            { key: 'int', label: '지' }
        ];

        const state = {
            role: ROLES[0].key,
            sub:  SUBS[0].key,
            type: TYPES[0].key
        };

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderRoleTabs() {
            const el = document.getElementById('role-tabs');
            el.innerHTML = ROLES.map(r =>
                `<button class="role-tab ${r.key === state.role ? 'active' : ''}"
                         data-role="${r.key}">${r.label}</button>`
            ).join('');
        }

        function renderSubTabs() {
            const el = document.getElementById('sub-tabs');
            el.innerHTML = SUBS.map(s =>
                `<button class="sub-tab ${s.key === state.sub ? 'active' : ''}"
                         data-sub="${s.key}">${s.label}</button>`
            ).join('');
        }

        function renderTypeButtons() {
            const el = document.getElementById('type-buttons');
            if (state.sub === 'special' || state.sub === 'action') {
                el.style.display = 'none';
                el.innerHTML = '';
                return;
            }
            el.style.display = '';
            el.innerHTML = TYPES.map(t =>
                `<button class="type-btn type-${t.key} ${t.key === state.type ? 'active' : ''}"
                         data-type="${t.key}" title="${t.label}">${t.label}</button>`
            ).join('');

        function substituteType(template, typeKey) {
            const typeMeta = TYPES.find(t => t.key === typeKey);
            const label = typeMeta ? typeMeta.label : '';
            const span = `<span class="type-text type-${typeKey}">${escapeHtml(label)} 속성</span>`;
            return escapeHtml(template).replace(/\{TYPE\} 속성/g, span);
        }

        function renderBody(raw) {
            const filled = raw && raw.length > 0;
            const text = filled ? substituteType(raw, state.type) : '설명 입력 대기';
            return `<div class="lv-body ${filled ? 'filled' : ''}">${text}</div>`;
        }

        const SPECIAL_TITLES = ['공투 전투 모험의 효과', '듀얼 효과'];
        const SPECIAL_TITLE_CLASS = ['adv', 'duel'];

        function renderSpecialBoxes(rawArr) {
            const arr = Array.isArray(rawArr) ? rawArr : ['', ''];
            return arr.slice(0, 2).map((raw, i) => `
                <div class="special-box">
                    <span class="special-title ${SPECIAL_TITLE_CLASS[i]}">${SPECIAL_TITLES[i]}</span>
                    ${renderBody(raw)}
                </div>
            `).join('');
        }

        function renderActionText(raw) {
            return escapeHtml(raw)
                .replace(/\{첫번째 타입\}/g, '<span class="type-slot first">{첫번째 타입}</span>')
                .replace(/\{두번째 타입\}/g, '<span class="type-slot second">{두번째 타입}</span>');
        }

        function renderDescription() {
            const el = document.getElementById('description');

            if (state.sub === 'action') {
                const raw = ACTION_SHARED || '';
                const filled = raw.length > 0;
                const body = filled
                    ? `<div class="lv-body filled">${renderActionText(raw)}</div>`
                    : `<div class="lv-body">설명 입력 대기</div>`;
                el.innerHTML = `
                    <div class="action-note">
                        <span class="note-icon">⚠️</span>
                        <span>선택된 공투 선장 캐릭터의 첫번째 타입과 두번째 타입을 의미합니다.</span>
                    </div>
                    <div class="lv-section action-section">${body}</div>
                `;
                return;
            }

            const subData = COOP_DATA[state.role]?.[state.sub] || {};
            el.innerHTML = LEVELS.map(lv => {
                const raw = subData[lv];
                let bodies;
                if (state.sub === 'special') {
                    bodies = renderSpecialBoxes(raw);
                } else if (Array.isArray(raw)) {
                    bodies = raw.map(renderBody).join('');
                } else {
                    bodies = renderBody(raw || '');
                }
                return `
                    <div class="lv-section" data-lv="${lv}">
                        <div class="lv-label">Lv.${lv}</div>
                        ${bodies}
                    </div>
                `;
            }).join('');
        }

        function renderAll() {
            renderRoleTabs();
            renderSubTabs();
            renderTypeButtons();
            renderDescription();
        }

        document.addEventListener('click', (e) => {
            const t = e.target;
            if (t.matches('.role-tab')) {
                state.role = t.dataset.role;
                renderRoleTabs();
                renderDescription();
            } else if (t.matches('.sub-tab')) {
                state.sub = t.dataset.sub;
                renderSubTabs();
                renderTypeButtons();
                renderDescription();
            } else if (t.matches('.type-btn')) {
                state.type = t.dataset.type;
                renderTypeButtons();
                renderDescription();
            }
        });

        document.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
</html>
